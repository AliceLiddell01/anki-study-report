name: Temporary G1.3 canonical publication

on:
  push:
    branches:
      - temp/g1-3-publish
    paths:
      - .github/workflows/temp-g1-3-publish.yml

permissions:
  contents: read

concurrency:
  group: temp-g1-3-publish-gamification
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      REPO_URL: https://github.com/AliceLiddell01/anki-study-report.git
      TEMP_BRANCH: temp/g1-3-publish
      CANONICAL_BRANCH: gamification
      EXPECTED_CANONICAL_TIP: 854bb841de918d6b7d719d7136c9426aad9cdc8d
      ARCHIVE_SHA256: 883fb8d5ecac12f944f2b6fc937d8a9a7ff22a788ce6dbb41849fa92f7164314
    steps:
      - name: Validate, publish, and remove temporary ref
        shell: bash
        run: |
          set -euo pipefail
          auth_header="AUTHORIZATION: bearer $GH_TOKEN"
          mkdir work
          cd work
          git init -q
          git remote add origin "$REPO_URL"
          git -c http.extraheader="$auth_header" fetch --no-tags origin \
            "refs/heads/$TEMP_BRANCH:refs/remotes/origin/temp-stage" \
            "refs/heads/$CANONICAL_BRANCH:refs/remotes/origin/canonical"
          test "$(git rev-parse refs/remotes/origin/canonical)" = "$EXPECTED_CANONICAL_TIP"
          git checkout -q -B publish refs/remotes/origin/canonical

          : > /tmp/g13.b64
          for part in 00 01 02 03; do
            git show "refs/remotes/origin/temp-stage:.github/g1-3-temp/archive.part$part" >> /tmp/g13.b64
          done
          base64 -d /tmp/g13.b64 > /tmp/g13-files.tgz
          echo "$ARCHIVE_SHA256  /tmp/g13-files.tgz" | sha256sum -c -
          tar -xzf /tmp/g13-files.tgz

          cat > /tmp/expected.sha256 <<'HASHES'
          d6517d0083bfb8200a30a23773c971e155f332962246bfaa8a8d9a4ae1517771  docs/ai-handoff.md
          89d91e9568c16ab65a4770df9911e1e9c91b3a88a7953e4d694c075ce1efe29b  docs/gamification/README.md
          52a1472ed1ad8297320712eafff26b073941d9766a869e4c037eccc57a5f4014  docs/gamification/review-xp-candidate-protocol.md
          c59b9ec6e5d3f310b41314a7e43daef064cf001af66fff5fbc851c648d06127b  research/gamification-sim/README.md
          95070bbbf5089561d83cfc81bb69526b209003d26573c8c2d94f15a6200568a1  research/gamification-sim/contracts/review-xp-candidate-protocol-v1.json
          953d5273d61b44ea5c4871386dade400bc0199d5f33431f23e68325384aa008c  research/gamification-sim/schemas/review-xp-candidate-protocol-v1.schema.json
          326758234e3187dad88c96b329f5af23c3e70a2c0b4417f007545e1506a99f76  roadmap/README.md
          10176a652367c145fe61e13c8967b6756a796b8f13c149aa418630cc5630bed4  roadmap/gamification/README.md
          0028a85f1a715f5434740a603af6063f3f097fc6235da5028c0cc88980ea849c  roadmap/gamification/g1-candidate-protocol.md
          HASHES
          sed -i 's/^          //' /tmp/expected.sha256
          sha256sum -c /tmp/expected.sha256

          python3 - <<'PY'
          import json, math, re, subprocess
          from collections import Counter
          from pathlib import Path

          allow = {
              'docs/ai-handoff.md',
              'docs/gamification/README.md',
              'docs/gamification/review-xp-candidate-protocol.md',
              'research/gamification-sim/README.md',
              'research/gamification-sim/contracts/review-xp-candidate-protocol-v1.json',
              'research/gamification-sim/schemas/review-xp-candidate-protocol-v1.schema.json',
              'roadmap/README.md',
              'roadmap/gamification/README.md',
              'roadmap/gamification/g1-candidate-protocol.md',
          }
          changed = set(subprocess.check_output(
              ['git', 'diff', '--name-only', 'refs/remotes/origin/canonical', '--'], text=True
          ).splitlines())
          if changed != allow:
              raise SystemExit(f'changed path mismatch: {sorted(changed ^ allow)}')

          def strict_load(path):
              def pairs(items):
                  result = {}
                  for key, value in items:
                      if key in result:
                          raise ValueError(f'duplicate key: {key}')
                      result[key] = value
                  return result
              return json.loads(Path(path).read_text(encoding='utf-8'), object_pairs_hook=pairs)

          contract_path = 'research/gamification-sim/contracts/review-xp-candidate-protocol-v1.json'
          schema_path = 'research/gamification-sim/schemas/review-xp-candidate-protocol-v1.schema.json'
          contract = strict_load(contract_path)
          schema = strict_load(schema_path)
          if schema.get('$schema') != 'https://json-schema.org/draft/2020-12/schema':
              raise SystemExit('wrong schema draft')
          if schema.get('$id') != 'https://anki-study-report.local/schemas/review-xp-candidate-protocol-v1.schema.json':
              raise SystemExit('wrong schema id')
          expected = json.dumps(contract, ensure_ascii=False, indent=2, sort_keys=True, allow_nan=False) + '\n'
          if expected != Path(contract_path).read_text(encoding='utf-8'):
              raise SystemExit('non-deterministic contract serialization')

          def walk(value):
              if isinstance(value, float) and not math.isfinite(value):
                  raise SystemExit('non-finite number')
              if isinstance(value, dict):
                  for item in value.values(): walk(item)
              elif isinstance(value, list):
                  for item in value: walk(item)
          walk(contract)

          if len(contract['candidate_families']) > 3:
              raise SystemExit('family limit')
          counts = Counter(item['candidate_id'] for item in contract['parameterizations'])
          if any(count > 2 for count in counts.values()):
              raise SystemExit('parameterization limit')
          bounds = {item['parameter_id']: item for item in contract['parameter_bounds']}
          for item in contract['parameterizations']:
              for key, value in item['parameter_values'].items():
                  bound = bounds[key]
                  if not bound['minimum'] <= value <= bound['maximum']:
                      raise SystemExit('value outside bounds')
          total = math.prod(contract['screening_budget']['dimension_sizes'].values())
          if total != 160 or total != contract['screening_budget']['computed_max_units']:
              raise SystemExit('budget mismatch')
          if contract['readiness']['g1_4_started'] or contract['readiness']['candidate_selected']:
              raise SystemExit('forbidden G1.4/candidate state')
          if contract['production_boundary']['production_approved']:
              raise SystemExit('forbidden production approval')
          for section in ('hard_gates', 'falsification_conditions', 'stop_conditions'):
              if any(item.get('score_compensation_allowed') is not False for item in contract[section]):
                  raise SystemExit('hard-gate compensation enabled')

          unsafe = re.compile(r'(^/|^[A-Za-z]:|(?:^|/)\.\.(?:/|$)|\\|^[A-Za-z][A-Za-z0-9+.-]*:|[\x00-\x1f\x7f])')
          for item in contract['provenance']['frozen_source_blobs']:
              path = item['path']
              if unsafe.search(path) or not Path(path).is_file():
                  raise SystemExit(f'unsafe or missing frozen path: {path}')

          link_re = re.compile(r'\[[^]]+\]\(([^)]+)\)')
          root = Path.cwd().resolve()
          for path in allow:
              if not path.endswith('.md'):
                  continue
              for target in link_re.findall(Path(path).read_text(encoding='utf-8')):
                  if re.match(r'^[a-z]+://', target):
                      continue
                  resolved = (root / Path(path).parent / target).resolve()
                  if not resolved.exists():
                      raise SystemExit(f'broken link: {path} -> {target}')
          PY

          git diff --check refs/remotes/origin/canonical --
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          test "$(git diff --cached --name-only | wc -l)" -eq 9
          git commit -m "research: freeze Review candidate protocol and roadmap"
          git -c http.extraheader="$auth_header" push origin HEAD:"refs/heads/$CANONICAL_BRANCH"
          git -c http.extraheader="$auth_header" push origin :"refs/heads/$TEMP_BRANCH"
