name: R7 temporary Search card-details harness control

on:
  pull_request:
    branches:
      - core

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'c1-5r-7-search-card-details-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: c1-5r-7-search-card-details-fix
          fetch-depth: 0

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.head.ref }}" = "c1-5r-7-search-card-details-fix"
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install focused dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply exact Search card-details repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          smoke_path = Path('docker/anki-e2e/smoke-browser.mjs')
          source = smoke_path.read_text(encoding='utf-8')
          old_required = '  const required = ["cardId", "noteId", "deckId", "deckName", "noteTypeId", "noteTypeName", "templateOrdinal", "templateName", "primaryText", "state", "due", "interval", "repetitions", "lapses", "flag", "tagSummary", "deck", "noteType", "template", "queue", "tags", "renderedPreview"];'
          new_required = '  const required = ["cardId", "noteId", "deckId", "deckName", "noteTypeId", "noteTypeName", "templateOrdinal", "templateName", "displayText", "displaySource", "displayStatus", "displayTruncated", "state", "due", "interval", "repetitions", "lapses", "flag", "tagSummary", "deck", "noteType", "template", "queue", "tags", "renderedPreview"];'
          if source.count(old_required) != 1:
              raise SystemExit('Expected exactly one stale Card details field list')
          source = source.replace(old_required, new_required, 1)
          old_assert = '  assertBrowser(required.every((key) => Object.hasOwn(details || {}, key)), "Card inspect returns every declared detail field.");'
          new_assert = '''  assertBrowser(required.every((key) => Object.hasOwn(details || {}, key)), "Card inspect returns every declared detail field.");
            assertBrowser(typeof details?.displayText === "string" && typeof details?.displayTruncated === "boolean", "Card inspect returns bounded display identity values.");
            assertBrowser(["browser_question", "reviewer_front", "none"].includes(details?.displaySource), "Card inspect returns a current display source.");
            assertBrowser(["available", "media_only", "unavailable"].includes(details?.displayStatus), "Card inspect returns a current display status.");'''
          import textwrap
          new_assert = textwrap.dedent(new_assert).rstrip()
          if source.count(old_assert) != 1:
              raise SystemExit('Expected exactly one Card details completeness assertion')
          source = source.replace(old_assert, new_assert, 1)
          smoke_path.write_text(source, encoding='utf-8')

          test_path = Path('tests/test_docker_smoke_helpers.py')
          tests = test_path.read_text(encoding='utf-8')
          old_context = '''    action_contract = source.split("async function assertSafeEntityActions", 1)[1].split(
                  "async function assertSearchWorkspaceUi", 1
              )[0]

              assert 'const cardRequest = {\\n    schemaVersion: 2,' in query_contract'''
          new_context = '''    action_contract = source.split("async function assertSafeEntityActions", 1)[1].split(
                  "async function assertSearchWorkspaceUi", 1
              )[0]
              card_details = source.split("function assertCompleteCardDetails", 1)[1].split(
                  "function assertCompleteNoteDetails", 1
              )[0]

              assert 'const cardRequest = {\\n    schemaVersion: 2,' in query_contract'''
          old_context = textwrap.dedent(old_context)
          new_context = textwrap.dedent(new_context)
          if tests.count(old_context) != 1:
              raise SystemExit('Search test context marker was not unique')
          tests = tests.replace(old_context, new_context, 1)

          old_tail = '''    assert '{ mode: "notes", noteId, requestId }' not in action_contract
          '''
          new_tail = '''    assert '{ mode: "notes", noteId, requestId }' not in action_contract

              for field in ("displayText", "displaySource", "displayStatus", "displayTruncated"):
                  assert f'"{field}"' in card_details
              assert '"primaryText"' not in card_details
              assert '"browser_question", "reviewer_front", "none"' in card_details
              assert '"available", "media_only", "unavailable"' in card_details
          '''
          old_tail = textwrap.dedent(old_tail)
          new_tail = textwrap.dedent(new_tail)
          if tests.count(old_tail) != 1:
              raise SystemExit('Search test tail marker was not unique')
          tests = tests.replace(old_tail, new_tail, 1)
          test_path.write_text(tests, encoding='utf-8')
          PY

      - name: Verify focused repair
        shell: bash
        run: |
          set -euo pipefail
          node --check docker/anki-e2e/smoke-browser.mjs
          python -m pytest tests/test_docker_smoke_helpers.py
          git diff --check
          mapfile -t changed < <(git diff --name-only)
          test "${#changed[@]}" -eq 2
          test "${changed[0]}" = "docker/anki-e2e/smoke-browser.mjs"
          test "${changed[1]}" = "tests/test_docker_smoke_helpers.py"

      - name: Normalize and push one permanent commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin core
          git reset --mixed origin/core
          git add docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py
          mapfile -t staged < <(git diff --cached --name-only)
          test "${#staged[@]}" -eq 2
          test "${staged[0]}" = "docker/anki-e2e/smoke-browser.mjs"
          test "${staged[1]}" = "tests/test_docker_smoke_helpers.py"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "test: align Search card details with schema v2"
          git push --force-with-lease origin HEAD:c1-5r-7-search-card-details-fix
