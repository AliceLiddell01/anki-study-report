name: R7 temporary execution target history control

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: r7-execution-history-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  normalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-execution-history-trigger'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out exact target branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: c1-5r-7-execution-target-fix
          fetch-depth: 0
          persist-credentials: true

      - name: Verify and normalize exact target history
        shell: bash
        run: |
          set -euo pipefail
          base='e658192b23af377890a34bd63dd03c42be2050d8'
          expected_head='b554ffc92a10ec7cd59db18f17c0947096ca8bcf'
          test '${{ github.head_ref }}' = 'c1-5r-7-execution-history-trigger'
          test '${{ github.base_ref }}' = 'core'
          test "$(git rev-parse HEAD)" = "$expected_head"
          mapfile -t changed < <(git diff --name-only "$base" HEAD | sort)
          expected=(.github/workflows/r7-integrated-acceptance-v4.yml)
          test "${changed[*]}" = "${expected[*]}"
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/r7-integrated-acceptance-v4.yml').read_text(encoding='utf-8')
          old = '5fd983dd88315ff1e83e8d62ca1802ac1bd4b393'
          new = 'd5689557514025917bb888745a7bb3bb8dbf3d05'
          if old in text or text.count(new) != 2:
              raise SystemExit('Execution workflow is not bound exactly to the refreshed candidate.')
          PY
          git diff --check "$base" HEAD
          git reset --soft "$base"
          mapfile -t staged < <(git diff --cached --name-only | sort)
          test "${staged[*]}" = "${expected[*]}"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'ci: bind R7 execution to the refreshed clean candidate'
          test "$(git rev-list --count "$base"..HEAD)" = '1'
          git push \
            --force-with-lease=refs/heads/c1-5r-7-execution-target-fix:"$expected_head" \
            origin HEAD:refs/heads/c1-5r-7-execution-target-fix
