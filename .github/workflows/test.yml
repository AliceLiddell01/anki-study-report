name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web-dashboard/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web-dashboard
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: web-dashboard
        run: pnpm run test:frontend

      - name: Build dashboard into add-on
        working-directory: web-dashboard
        run: pnpm run test:build-dashboard

      - name: Run Python tests
        run: python -m pytest

      - name: Build and check add-on package
        working-directory: web-dashboard
        run: pnpm run test:package
