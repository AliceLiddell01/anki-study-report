name: R7 temporary Inspection Profiles label control

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: r7-inspection-label-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-inspection-label-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ github.event.pull_request.head.sha }}'
          test '${{ github.head_ref }}' = 'c1-5r-7-inspection-label-fix'
          test '${{ github.base_ref }}' = 'core'
          git cat-file -e '8b27c3e5cb9f8b29f918fbfb8ff2fdb964f44276^{commit}'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install focused dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Apply exact current-label repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          old = 'name: "Использовать подсказку", exact: true'
          new = 'name: "Восстановить предложенную настройку", exact: true'

          smoke = Path('docker/anki-e2e/smoke-browser.mjs')
          smoke_text = smoke.read_text(encoding='utf-8')
          if smoke_text.count(old) != 1 or smoke_text.count(new) != 0:
              raise SystemExit(f'Unexpected smoke label counts: old={smoke_text.count(old)}, new={smoke_text.count(new)}')
          smoke.write_text(smoke_text.replace(old, new), encoding='utf-8', newline='\n')

          tests = Path('tests/test_docker_smoke_helpers.py')
          test_text = tests.read_text(encoding='utf-8')
          if test_text.count(old) != 2 or test_text.count(new) != 0:
              raise SystemExit(f'Unexpected regression label counts: old={test_text.count(old)}, new={test_text.count(new)}')
          test_text = test_text.replace(old, new)
          current_assert = f"    assert '{new}' in workspace\n"
          stale_assert = f"    assert '{old}' not in workspace\n"
          if test_text.count(current_assert) != 1:
              raise SystemExit('Current-label assertion insertion point is not unique.')
          test_text = test_text.replace(current_assert, current_assert + stale_assert)
          tests.write_text(test_text, encoding='utf-8', newline='\n')
          PY

      - name: Verify focused repair
        shell: bash
        run: |
          set -euo pipefail
          node --check docker/anki-e2e/smoke-browser.mjs
          python -m pytest tests/test_docker_smoke_helpers.py
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(
            docker/anki-e2e/smoke-browser.mjs
            tests/test_docker_smoke_helpers.py
          )
          test "${changed[*]}" = "${expected[*]}"

      - name: Normalize and push one permanent commit
        shell: bash
        run: |
          set -euo pipefail
          old_sha="$(git rev-parse HEAD)"
          test -f .r7-inspection-label-trigger
          rm .r7-inspection-label-trigger
          git reset --mixed '8b27c3e5cb9f8b29f918fbfb8ff2fdb964f44276'
          git add docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py
          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(
            docker/anki-e2e/smoke-browser.mjs
            tests/test_docker_smoke_helpers.py
          )
          test "${staged[*]}" = "${expected[*]}"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test: use the current Inspection Profiles suggestion action'
          test "$(git rev-list --count '8b27c3e5cb9f8b29f918fbfb8ff2fdb964f44276'..HEAD)" = '1'
          git push \
            --force-with-lease=refs/heads/c1-5r-7-inspection-label-fix:"$old_sha" \
            origin HEAD:refs/heads/c1-5r-7-inspection-label-fix
