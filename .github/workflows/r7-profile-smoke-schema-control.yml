name: R7 temporary profile smoke schema control

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: r7-profile-smoke-schema-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-profile-smoke-schema-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ github.event.pull_request.head.sha }}'
          test '${{ github.head_ref }}' = 'c1-5r-7-profile-smoke-schema-fix'
          test '${{ github.base_ref }}' = 'core'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install focused test dependencies
        shell: bash
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Apply asserted schema repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          smoke = Path("docker/anki-e2e/smoke-api.py")
          text = smoke.read_text(encoding="utf-8")

          search_old = (
              '        {\n'
              '            "mode": "cards",\n'
              '            "query": "",\n'
          )
          search_new = (
              '        {\n'
              '            "schemaVersion": 2,\n'
              '            "mode": "cards",\n'
              '            "query": "",\n'
          )
          if text.count(search_old) != 1:
              raise SystemExit("Expected exactly one Inspection Profiles Search request without schemaVersion.")
          text = text.replace(search_old, search_new)

          triage_request_old = '            "schemaVersion": 2,\n            "dataset": "search_workset",\n'
          triage_request_new = '            "schemaVersion": 4,\n            "dataset": "search_workset",\n'
          if text.count(triage_request_old) != 1:
              raise SystemExit("Expected exactly one stale Inspection Profiles Triage v2 request.")
          text = text.replace(triage_request_old, triage_request_new)

          triage_assert_old = '    assert_true(triage.get("schemaVersion") == 2, "canonical triage v2 is active")\n'
          triage_assert_new = '    assert_true(triage.get("schemaVersion") == 4, "canonical triage v4 is active")\n'
          if text.count(triage_assert_old) != 1:
              raise SystemExit("Expected exactly one stale Inspection Profiles Triage v2 assertion.")
          text = text.replace(triage_assert_old, triage_assert_new)
          smoke.write_text(text, encoding="utf-8", newline="\n")

          tests = Path("tests/test_docker_smoke_helpers.py")
          tests_text = tests.read_text(encoding="utf-8")
          marker = "def test_smoke_api_selects_rich_media_fixture_when_multiple_japanese_cards_match():\n"
          if tests_text.count(marker) != 1:
              raise SystemExit("Could not locate the exact smoke schema regression insertion point.")
          regression = dedent(
              '''
              def test_smoke_api_inspection_profile_requests_use_current_search_and_triage_schemas():
                  source = (
                      Path(__file__).resolve().parents[1] / "docker" / "anki-e2e" / "smoke-api.py"
                  ).read_text(encoding="utf-8")
                  search_helper = source.split("def search_note_type_cards", 1)[1].split(
                      "def reasons_for_note_type", 1
                  )[0]
                  profile_smoke = source.split("def assert_inspection_profiles_contract", 1)[1].split(
                      "def find_structure", 1
                  )[0]

                  assert '"schemaVersion": 2' in search_helper
                  assert '"schemaVersion": 4' in profile_smoke
                  assert 'triage.get("schemaVersion") == 4' in profile_smoke
                  assert "canonical triage v4 is active" in profile_smoke
                  assert "canonical triage v2 is active" not in profile_smoke


              '''
          ).lstrip()
          tests.write_text(tests_text.replace(marker, regression + marker), encoding="utf-8", newline="\n")
          PY

      - name: Capture focused verification
        id: verify
        shell: bash
        run: |
          set +e
          mkdir -p r7-profile-smoke-diagnostic
          {
            set -euo pipefail
            python -m py_compile docker/anki-e2e/smoke-api.py
            python -m pytest \
              tests/test_docker_smoke_helpers.py \
              tests/test_search_service.py \
              tests/test_triage_service.py \
              tests/test_dashboard_server.py::test_search_endpoints_require_token_post_and_preserve_typed_statuses \
              tests/test_dashboard_server.py::test_triage_endpoint_is_token_protected_post_json_only_and_strict
            git diff --check
            mapfile -t changed < <(git diff --name-only | sort)
            expected=(
              docker/anki-e2e/smoke-api.py
              tests/test_docker_smoke_helpers.py
            )
            printf 'actual=%s\n' "${changed[*]}"
            printf 'expected=%s\n' "${expected[*]}"
            test "${changed[*]}" = "${expected[*]}"
          } 2>&1 | tee r7-profile-smoke-diagnostic/verification.log
          status=${PIPESTATUS[0]}
          git diff --name-only | sort > r7-profile-smoke-diagnostic/changed-files.txt
          git diff --check > r7-profile-smoke-diagnostic/diff-check.txt 2>&1
          git diff > r7-profile-smoke-diagnostic/repair.patch
          printf '{"schemaVersion":1,"exitCode":%s,"candidateSha":"%s"}\n' "$status" '${{ github.event.pull_request.head.sha }}' > r7-profile-smoke-diagnostic/summary.json
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bounded verification diagnostic
        id: diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r7-profile-smoke-diagnostic-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: r7-profile-smoke-diagnostic/
          if-no-files-found: error
          retention-days: 3
          compression-level: 9

      - name: Restore verification result
        shell: bash
        run: |
          set -euo pipefail
          test '${{ steps.verify.outputs.exit_code }}' = '0'

      - name: Commit and push bounded repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docker/anki-e2e/smoke-api.py tests/test_docker_smoke_helpers.py
          git commit -m 'test: align Inspection Profiles smoke schemas'
          git push origin HEAD:c1-5r-7-profile-smoke-schema-fix
