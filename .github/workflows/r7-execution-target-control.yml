name: R7 temporary execution target control

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: r7-execution-target-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-target:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-execution-target-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ github.event.pull_request.head.sha }}'
          test '${{ github.head_ref }}' = 'c1-5r-7-execution-target-fix'
          test '${{ github.base_ref }}' = 'core'

      - name: Apply exact candidate SHA replacement
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/r7-integrated-acceptance-v4.yml')
          text = path.read_text(encoding='utf-8')
          old = 'e35dd132a4da5cc31ad48ef1aad39bf6fd1acfe8'
          new = '5fd983dd88315ff1e83e8d62ca1802ac1bd4b393'
          if text.count(old) != 2:
              raise SystemExit(f'Expected exactly two old candidate SHA occurrences, found {text.count(old)}.')
          if new in text:
              raise SystemExit('New candidate SHA already exists before replacement.')
          path.write_text(text.replace(old, new), encoding='utf-8', newline='\n')
          PY

      - name: Verify bounded workflow diff
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/r7-integrated-acceptance-v4.yml').read_text(encoding='utf-8')
          old = 'e35dd132a4da5cc31ad48ef1aad39bf6fd1acfe8'
          new = '5fd983dd88315ff1e83e8d62ca1802ac1bd4b393'
          if old in text or text.count(new) != 2:
              raise SystemExit('Execution workflow candidate SHA replacement is incoherent.')
          PY
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(.github/workflows/r7-integrated-acceptance-v4.yml)
          test "${changed[*]}" = "${expected[*]}"

      - name: Commit and push bounded target update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/r7-integrated-acceptance-v4.yml
          git commit -m 'ci: bind R7 execution to the refreshed clean candidate'
          git push origin HEAD:c1-5r-7-execution-target-fix
