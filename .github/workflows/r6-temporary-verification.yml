name: R6 temporary verification

on:
  push:
    branches:
      - c1-5r-6-guided-inspection-profiles
  pull_request:
    branches:
      - core
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r6-temporary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-backend:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Capture focused backend
        id: backend
        continue-on-error: true
        shell: pwsh
        run: |
          $args = @(
            'scripts/run_python.mjs', '-m', 'pytest', '-q',
            'tests/test_inspection_profile_store.py',
            'tests/test_inspection_profile_service.py',
            'tests/test_inspection_profile_runtime.py',
            'tests/test_dashboard_server.py',
            'tests/test_triage_candidates.py',
            'tests/test_triage_service.py',
            'tests/test_package_build.py'
          )
          & node $args *> r6-backend.txt
          exit $LASTEXITCODE
      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r6-backend-${{ github.run_id }}
          path: r6-backend.txt
          if-no-files-found: error
          retention-days: 1
      - name: Fail on backend error
        if: always()
        shell: pwsh
        run: |
          Get-Content r6-backend.txt
          if ('${{ steps.backend.outcome }}' -ne 'success') { exit 1 }
