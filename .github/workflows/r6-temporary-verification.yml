name: R6 temporary verification

on:
  push:
    branches:
      - c1-5r-6-guided-inspection-profiles
  pull_request:
    branches:
      - core
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r6-temporary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          New-Item -ItemType Directory -Force .r6-artifacts | Out-Null
      - name: Install dashboard dependencies
        working-directory: web-dashboard
        shell: pwsh
        run: pnpm install --frozen-lockfile
      - name: Focused frontend
        working-directory: web-dashboard
        shell: pwsh
        run: |
          pnpm exec vitest run `
            src/pages/InspectionProfilesSettingsPage.test.tsx `
            src/hooks/useInspectionProfilesWorkspace.test.tsx `
            src/components/inspection-profiles/BasicProfileEditor.test.tsx `
            src/components/inspection-profiles/AdvancedProfileDisclosure.test.tsx `
            src/components/inspection-profiles/ProfileValidationResult.test.tsx `
            src/lib/inspectionProfileBasicView.test.ts `
            src/lib/inspectionProfilesApi.test.ts 2>&1 | Tee-Object ..\.r6-artifacts\focused-frontend.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Typecheck
        working-directory: web-dashboard
        shell: pwsh
        run: |
          pnpm run typecheck 2>&1 | Tee-Object ..\.r6-artifacts\typecheck.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Focused backend
        shell: pwsh
        run: |
          node scripts/run_python.mjs -m pytest -q `
            tests/test_inspection_profile_store.py `
            tests/test_inspection_profile_service.py `
            tests/test_inspection_profile_runtime.py `
            tests/test_dashboard_server.py `
            tests/test_triage_candidates.py `
            tests/test_triage_service.py `
            tests/test_package_build.py 2>&1 | Tee-Object .r6-artifacts\focused-backend.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Production build
        working-directory: web-dashboard
        shell: pwsh
        run: |
          pnpm run build:addon 2>&1 | Tee-Object ..\.r6-artifacts\build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Package validation
        shell: pwsh
        run: |
          node scripts/run_python.mjs scripts/package_addon.py --check 2>&1 | Tee-Object .r6-artifacts\package.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node scripts/run_python.mjs scripts/package_addon.py --check-only 2>&1 | Tee-Object -Append .r6-artifacts\package.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Canonical non-Docker
        shell: pwsh
        run: |
          .\scripts\run_full_check.ps1 -SkipDocker 2>&1 | Tee-Object .r6-artifacts\canonical.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload temporary diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r6-verification-${{ github.run_id }}
          path: .r6-artifacts
          if-no-files-found: warn
          retention-days: 1
      - name: Git hygiene
        if: always()
        shell: pwsh
        run: |
          git status --short --branch
          git diff --check
