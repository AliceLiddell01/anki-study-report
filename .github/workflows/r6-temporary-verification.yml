name: R6 temporary verification

on:
  push:
    branches:
      - c1-5r-6-guided-inspection-profiles
  pull_request:
    branches:
      - core
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r6-temporary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-typecheck:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install dashboard dependencies
        working-directory: web-dashboard
        shell: pwsh
        run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        id: typecheck
        continue-on-error: true
        working-directory: web-dashboard
        shell: pwsh
        run: |
          cmd /c "pnpm run typecheck > ..\r6-typecheck.txt 2>&1"
          exit $LASTEXITCODE
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r6-typecheck-${{ github.run_id }}
          path: r6-typecheck.txt
          if-no-files-found: error
          retention-days: 1
      - name: Fail on typecheck error
        if: always()
        shell: pwsh
        run: |
          Get-Content r6-typecheck.txt
          if ('${{ steps.typecheck.outcome }}' -ne 'success') { exit 1 }
