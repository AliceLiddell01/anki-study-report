name: R6 temporary verification

on:
  push:
    branches:
      - c1-5r-6-guided-inspection-profiles
  pull_request:
    branches:
      - core
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r6-temporary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-frontend:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install dashboard dependencies
        working-directory: web-dashboard
        shell: pwsh
        run: pnpm install --frozen-lockfile
      - name: Page tests
        continue-on-error: true
        id: page
        working-directory: web-dashboard
        run: pnpm exec vitest run src/pages/InspectionProfilesSettingsPage.test.tsx
      - name: Hook tests
        continue-on-error: true
        id: hook
        working-directory: web-dashboard
        run: pnpm exec vitest run src/hooks/useInspectionProfilesWorkspace.test.tsx
      - name: Basic editor tests
        continue-on-error: true
        id: basic
        working-directory: web-dashboard
        run: pnpm exec vitest run src/components/inspection-profiles/BasicProfileEditor.test.tsx
      - name: Advanced disclosure tests
        continue-on-error: true
        id: advanced
        working-directory: web-dashboard
        run: pnpm exec vitest run src/components/inspection-profiles/AdvancedProfileDisclosure.test.tsx
      - name: Validation result tests
        continue-on-error: true
        id: validation
        working-directory: web-dashboard
        run: pnpm exec vitest run src/components/inspection-profiles/ProfileValidationResult.test.tsx
      - name: Projection tests
        continue-on-error: true
        id: projection
        working-directory: web-dashboard
        run: pnpm exec vitest run src/lib/inspectionProfileBasicView.test.ts
      - name: API regression tests
        continue-on-error: true
        id: api
        working-directory: web-dashboard
        run: pnpm exec vitest run src/lib/inspectionProfilesApi.test.ts
      - name: Fail when any focused test failed
        if: always()
        shell: pwsh
        run: |
          $failed = @()
          if ('${{ steps.page.outcome }}' -ne 'success') { $failed += 'page' }
          if ('${{ steps.hook.outcome }}' -ne 'success') { $failed += 'hook' }
          if ('${{ steps.basic.outcome }}' -ne 'success') { $failed += 'basic' }
          if ('${{ steps.advanced.outcome }}' -ne 'success') { $failed += 'advanced' }
          if ('${{ steps.validation.outcome }}' -ne 'success') { $failed += 'validation' }
          if ('${{ steps.projection.outcome }}' -ne 'success') { $failed += 'projection' }
          if ('${{ steps.api.outcome }}' -ne 'success') { $failed += 'api' }
          if ($failed.Count) { Write-Error ('Failed focused files: ' + ($failed -join ', ')); exit 1 }
