name: R6 temporary verification

on:
  push:
    branches:
      - c1-5r-6-guided-inspection-profiles
  pull_request:
    branches:
      - core
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r6-temporary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          ref: core
          path: baseline
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install dashboard and Chromium
        working-directory: web-dashboard
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Prepare baseline dependencies
        shell: bash
        run: ln -s "$GITHUB_WORKSPACE/web-dashboard/node_modules" "$GITHUB_WORKSPACE/baseline/web-dashboard/node_modules"
      - name: Start deterministic Vite servers
        shell: bash
        run: |
          mkdir -p r6-visual
          (cd web-dashboard && pnpm exec vite --host 127.0.0.1 --port 4173 > ../r6-visual/current-vite.log 2>&1 & echo $! > ../r6-visual/current-vite.pid)
          (cd baseline/web-dashboard && "$GITHUB_WORKSPACE/web-dashboard/node_modules/.bin/vite" --host 127.0.0.1 --port 4174 > ../../r6-visual/baseline-vite.log 2>&1 & echo $! > ../../r6-visual/baseline-vite.pid)
          for port in 4173 4174; do
            for attempt in $(seq 1 60); do
              if curl --silent --fail "http://127.0.0.1:${port}/" > /dev/null; then break; fi
              sleep 1
            done
            curl --silent --fail "http://127.0.0.1:${port}/" > /dev/null
          done
      - name: Create disposable visual harness
        shell: bash
        run: |
          cat > web-dashboard/r6-visual.mjs <<'R6_SCRIPT'
          import fs from "node:fs/promises";
          import path from "node:path";
          import { chromium } from "playwright";

          const output = path.resolve("../r6-visual");
          const currentBase = "http://127.0.0.1:4173";
          const baselineBase = "http://127.0.0.1:4174";
          const fingerprint = (character) => ({ algorithm: "sha256", value: character.repeat(64) });
          const now = "2026-07-20T12:00:00Z";
          const observations = [];
          let updateCalls = 0;
          let validationMode = "success";
          let conflictMode = false;

          const fieldRefs = (names) => names.map((name, ordinal) => ({ ordinal, name }));
          const mapping = (role, field, confidence = 0.94) => ({ role, fields: [field], confidence });
          const strictMapping = ({ role, fields }) => ({ role, fields: fields.map((field) => ({ ...field })) });
          const clone = (value) => JSON.parse(JSON.stringify(value));

          function profile(item, storedState = "confirmed", override = {}) {
            return {
              profileId: `note-type-${item.structure.noteTypeId}`,
              noteTypeId: item.structure.noteTypeId,
              noteTypeName: item.structure.name,
              storedState,
              displayName: item.structure.name,
              expectedFingerprint: clone(item.structure.fingerprint),
              appliesTo: { templateOrdinals: [] },
              fieldMappings: item.suggestion.fieldMappings.map(strictMapping),
              checks: clone(item.suggestion.checks),
              confirmedAt: storedState === "confirmed" ? now : null,
              updatedAt: now,
              ...override,
            };
          }

          function item({ id, name, detectedKind, fieldNames, mappings, checks, state = "not_configured", reason = null, confidence = 0.92, unresolved = [], warnings = [], templates = ["Card 1"] }) {
            const fields = fieldRefs(fieldNames);
            const structure = {
              noteTypeId: String(id),
              name,
              kind: detectedKind === "cloze" ? "cloze" : "standard",
              fields,
              templates: templates.map((templateName, ordinal) => ({ ordinal, name: templateName, frontFields: fieldNames.slice(0, 1), backFields: fieldNames.slice(1) })),
              fingerprint: fingerprint(String(id).slice(-1)),
            };
            const suggestion = {
              detectedKind,
              confidence,
              fieldMappings: mappings.map(([role, fieldName]) => mapping(role, fields.find((field) => field.name === fieldName))),
              checks,
              warnings,
              unresolvedFields: unresolved.map((fieldName) => fields.find((field) => field.name === fieldName)),
            };
            const result = { structure, effectiveState: state, stateReason: reason, authoritative: state === "confirmed", storedProfile: null, suggestion };
            if (state !== "not_configured") {
              const storedState = state === "disabled" ? "disabled" : state === "suggested" ? "suggested" : "confirmed";
              result.storedProfile = profile(result, storedState);
              if (state === "needs_review") result.storedProfile.expectedFingerprint = fingerprint("a");
            }
            return result;
          }

          const japanese = item({
            id: 101,
            name: "Japanese Vocabulary",
            detectedKind: "japanese_vocab",
            fieldNames: ["Word", "Meaning", "Example", "Part of speech", "Audio", "Image", "Pitch"],
            mappings: [["term", "Word"], ["meaning", "Meaning"], ["example", "Example"], ["part_of_speech", "Part of speech"], ["audio", "Audio"], ["image", "Image"], ["pitch", "Pitch"]],
            checks: [
              { checkId: "meaning-required", kind: "non_empty", roles: ["meaning"], mode: "any", priority: "high" },
              { checkId: "audio-required", kind: "contains_audio", roles: ["audio"], mode: "any", priority: "high" },
              { checkId: "example-required", kind: "non_empty", roles: ["example"], mode: "any", priority: "medium" },
              { checkId: "pos-required", kind: "non_empty", roles: ["part_of_speech"], mode: "any", priority: "medium" },
              { checkId: "image-required", kind: "contains_image", roles: ["image"], mode: "any", priority: "low" },
            ],
            templates: ["Recognition", "Production"],
          });
          const programming = item({
            id: 102,
            name: "Programming Q&A",
            detectedKind: "programming",
            fieldNames: ["Question", "Answer", "Code", "Explanation"],
            mappings: [["question", "Question"], ["answer", "Answer"], ["code", "Code"], ["explanation", "Explanation"]],
            checks: [
              { checkId: "question-required", kind: "non_empty", roles: ["question"], mode: "any", priority: "high" },
              { checkId: "answer-required", kind: "non_empty", roles: ["answer"], mode: "any", priority: "high" },
              { checkId: "explanation-length", kind: "min_text_length", roles: ["explanation"], mode: "any", priority: "medium", minLength: 20 },
            ],
          });
          const confirmed = item({ id: 103, name: "Confirmed Basic", detectedKind: "generic", fieldNames: ["Front", "Back"], mappings: [["question", "Front"], ["answer", "Back"]], checks: [{ checkId: "front-required", kind: "non_empty", roles: ["question"], mode: "any", priority: "high" }], state: "confirmed" });
          const needsReview = item({ id: 104, name: "Renamed Fields", detectedKind: "generic", fieldNames: ["Prompt", "Response"], mappings: [["question", "Prompt"], ["answer", "Response"]], checks: [{ checkId: "prompt-required", kind: "non_empty", roles: ["question"], mode: "any", priority: "high" }], state: "needs_review", reason: "field_changed" });
          const disabled = item({ id: 105, name: "Disabled Profile", detectedKind: "generic", fieldNames: ["Front", "Back"], mappings: [["question", "Front"], ["answer", "Back"]], checks: [{ checkId: "answer-required", kind: "non_empty", roles: ["answer"], mode: "any", priority: "high" }], state: "disabled" });
          const ambiguous = item({ id: 106, name: "Custom Study Note", detectedKind: "unknown", fieldNames: ["Prompt", "Response", "Mystery Field"], mappings: [["question", "Prompt"], ["answer", "Response"]], checks: [{ checkId: "prompt-required", kind: "non_empty", roles: ["question"], mode: "any", priority: "medium" }], confidence: 0.3, unresolved: ["Mystery Field"], warnings: ["ambiguous_fields"] });
          const suggested = item({ id: 107, name: "Saved Draft", detectedKind: "generic", fieldNames: ["Front", "Back"], mappings: [["question", "Front"], ["answer", "Back"]], checks: [{ checkId: "back-required", kind: "non_empty", roles: ["answer"], mode: "any", priority: "medium" }], state: "suggested" });
          const items = [japanese, programming, confirmed, needsReview, disabled, ambiguous, suggested];

          const queryResponse = {
            schemaVersion: 1,
            status: "available",
            store: { status: "available", revision: 3, profileCount: 5, errorCode: null, quarantined: false },
            totalCount: items.length,
            returnedCount: items.length,
            limit: 500,
            truncated: false,
            skippedCount: 0,
            items,
          };

          function successPreview(profileValue) {
            return {
              schemaVersion: 2,
              valid: true,
              effectiveState: "suggested",
              stateReason: null,
              fieldErrors: {},
              preview: {
                status: validationMode === "unavailable" ? "unavailable" : "available",
                requestedCount: 10,
                evaluatedCount: validationMode === "unavailable" ? 0 : 2,
                missingCardIds: validationMode === "unavailable" ? [] : ["999"],
                failureCount: 0,
                truncated: false,
                items: validationMode === "unavailable" ? [] : [
                  { cardId: "501", noteId: "601", failureCount: 0, failures: [] },
                  { cardId: "502", noteId: "602", failureCount: 0, failures: [] },
                ],
              },
            };
          }

          function validationResponse(profileValue) {
            if (validationMode !== "errors") return successPreview(profileValue);
            return {
              schemaVersion: 2,
              valid: false,
              effectiveState: "suggested",
              stateReason: "invalid_profile",
              fieldErrors: { "profile.checks.0.roles": "select_role" },
              preview: { status: "available", requestedCount: 10, evaluatedCount: 0, missingCardIds: [], failureCount: 0, truncated: false, items: [] },
            };
          }

          async function configurePage(base, viewport, theme = "light") {
            updateCalls = 0;
            validationMode = "success";
            conflictMode = false;
            const context = await browser.newContext({ viewport, deviceScaleFactor: 1 });
            await context.addInitScript(({ themeValue }) => {
              localStorage.setItem("anki-study-report-language", "en");
              localStorage.setItem("anki-study-report-theme", themeValue);
            }, { themeValue: theme });
            const page = await context.newPage();
            const errors = [];
            page.on("pageerror", (error) => errors.push(String(error)));
            page.on("console", (message) => { if (message.type() === "error") errors.push(message.text()); });
            await page.route("**/api/report**", (route) => route.fulfill({ status: 404, contentType: "application/json", body: JSON.stringify({ error: "empty" }) }));
            await page.route("**/api/telemetry/**", (route) => route.fulfill({ status: 204, body: "" }));
            await page.route("**/api/inspection-profiles/**", async (route) => {
              const url = new URL(route.request().url());
              const operation = url.pathname.split("/").pop();
              if (operation === "query") return route.fulfill({ status: 200, contentType: "application/json", body: JSON.stringify({ ok: true, response: queryResponse }) });
              if (operation === "validate") {
                const request = route.request().postDataJSON();
                return route.fulfill({ status: 200, contentType: "application/json", body: JSON.stringify({ ok: true, response: validationResponse(request.profile) }) });
              }
              if (operation === "update") {
                updateCalls += 1;
                if (conflictMode) return route.fulfill({ status: 409, contentType: "application/json", body: JSON.stringify({ error: "inspection_profile_revision_conflict", currentRevision: 7 }) });
                const request = route.request().postDataJSON();
                const responseProfile = request.action === "delete" ? null : request.profile ?? confirmed.storedProfile;
                return route.fulfill({ status: 200, contentType: "application/json", body: JSON.stringify({ ok: true, response: { schemaVersion: 1, action: request.action, store: { ...queryResponse.store, revision: 4 }, profile: responseProfile } }) });
              }
              return route.fulfill({ status: 404, contentType: "application/json", body: "{}" });
            });
            await page.goto(`${base}/?token=r6-visual#/settings/inspection-profiles`, { waitUntil: "networkidle", timeout: 60000 });
            await closeNotices(page);
            await page.locator(".inspection-note-button").first().waitFor({ state: "visible", timeout: 20000 });
            return { page, context, errors };
          }

          async function closeNotices(page) {
            for (let attempt = 0; attempt < 5; attempt += 1) {
              const dialog = page.locator('[role="dialog"]:visible').first();
              if (!(await dialog.isVisible().catch(() => false))) return;
              await page.keyboard.press("Escape");
              await page.waitForTimeout(120);
              if (await dialog.isVisible().catch(() => false)) {
                const close = dialog.locator('button[aria-label*="Close" i], button[aria-label*="Закры" i]').first();
                if (await close.isVisible().catch(() => false)) await close.click();
              }
            }
          }

          async function select(page, name) {
            await page.locator(".inspection-note-button", { hasText: name }).click();
            await page.locator("[data-testid='inspection-basic-editor']").waitFor({ state: "visible" });
          }

          async function capture({ base = currentBase, name, viewport = { width: 1440, height: 1000 }, theme = "light", note, action, baseline = false }) {
            const { page, context, errors } = await configurePage(base, viewport, theme);
            try {
              await select(page, note);
              if (action) await action(page);
              await page.waitForTimeout(180);
              const width = await page.evaluate(() => ({ scroll: document.documentElement.scrollWidth, client: document.documentElement.clientWidth, height: document.documentElement.scrollHeight }));
              if (width.scroll > width.client) throw new Error(`${name}: horizontal overflow ${width.scroll} > ${width.client}`);
              if (errors.length) throw new Error(`${name}: browser errors ${errors.join(" | ")}`);
              const target = path.join(output, name);
              await page.screenshot({ path: target, fullPage: true });
              observations.push({ name, viewport, theme, note, pageHeight: width.height, updateCalls, baseline });
            } finally {
              await context.close();
            }
          }

          async function assertCurrentNormalPaths() {
            const { page, context, errors } = await configurePage(currentBase, { width: 1440, height: 1000 }, "light");
            try {
              await select(page, "Japanese Vocabulary");
              const basic = page.locator("[data-testid='inspection-basic-editor']");
              if (!(await basic.getByText("Audio must contain audio", { exact: true }).isVisible())) throw new Error("Japanese Audio requirement is not visible.");
              if (await page.getByRole("button", { name: /Use suggestion/i }).count()) throw new Error("Use suggestion is still visible in the current normal path.");
              if (await basic.getByText("audio-required", { exact: true }).count()) throw new Error("Check ID leaked into Basic.");
              if (await basic.getByText("part_of_speech", { exact: true }).count()) throw new Error("Role slug leaked into Basic.");
              const advanced = page.locator("details.inspection-major-disclosure").first();
              if (await advanced.getAttribute("open") !== null) throw new Error("Advanced is open initially.");
              const primary = page.locator(".inspection-primary-actions .primary-button:visible");
              if (await primary.count() !== 1) throw new Error(`Expected one primary action, got ${await primary.count()}.`);
              if (updateCalls !== 0) throw new Error("A mutation occurred before explicit action.");
              await select(page, "Programming Q&A");
              const programmingBasic = page.locator("[data-testid='inspection-basic-editor']");
              if (!(await programmingBasic.getByText("Question is required", { exact: true }).isVisible())) throw new Error("Programming Question requirement is absent.");
              if (!(await programmingBasic.getByText("Answer is required", { exact: true }).isVisible())) throw new Error("Programming Answer requirement is absent.");
              if (await programmingBasic.getByText(/audio/i).count()) throw new Error("Programming Basic invented Audio.");
              if (errors.length) throw new Error(errors.join(" | "));
            } finally {
              await context.close();
            }
          }

          const browser = await chromium.launch({ headless: true });
          try {
            await assertCurrentNormalPaths();

            await capture({ name: "r6-japanese-basic-1440-light.png", note: "Japanese Vocabulary" });
            await capture({ name: "r6-japanese-basic-1440-dark.png", note: "Japanese Vocabulary", theme: "dark" });
            await capture({ name: "r6-programming-basic-1440-light.png", note: "Programming Q&A" });
            await capture({ name: "r6-programming-basic-1024-light.png", note: "Programming Q&A", viewport: { width: 1024, height: 900 } });
            await capture({ name: "r6-confirmed-1440-light.png", note: "Confirmed Basic" });
            await capture({ name: "r6-confirmed-edited-1440-light.png", note: "Confirmed Basic", action: async (page) => { const selectControl = page.locator("#inspection-basic-priority-0"); await selectControl.selectOption("low"); } });
            await capture({ name: "r6-needs-review-1440-light.png", note: "Renamed Fields" });
            await capture({ name: "r6-disabled-1440-dark.png", note: "Disabled Profile", theme: "dark" });
            await capture({ name: "r6-advanced-open-1440-light.png", note: "Japanese Vocabulary", action: async (page) => { await page.locator("details.inspection-major-disclosure").first().locator("summary").click(); } });
            await capture({ name: "r6-validation-success-1440-light.png", note: "Japanese Vocabulary", action: async (page) => { validationMode = "success"; await page.getByRole("button", { name: "Check setup", exact: true }).click(); await page.locator("#inspection-validation-title").waitFor(); } });
            await capture({ name: "r6-validation-errors-1440-light.png", note: "Japanese Vocabulary", action: async (page) => { validationMode = "errors"; await page.getByRole("button", { name: "Check setup", exact: true }).click(); await page.locator("#inspection-errors-title").waitFor(); const summary = page.locator("#inspection-advanced-summary"); if (!(await summary.getByText(/1 errors/).isVisible())) throw new Error("Collapsed Advanced did not surface the hidden error count."); } });
            await capture({ name: "r6-preview-unavailable-1024-light.png", note: "Programming Q&A", viewport: { width: 1024, height: 900 }, action: async (page) => { validationMode = "unavailable"; await page.getByRole("button", { name: "Check setup", exact: true }).click(); await page.locator("#inspection-validation-title").waitFor(); } });
            await capture({ name: "r6-conflict-1440-light.png", note: "Japanese Vocabulary", action: async (page) => { conflictMode = true; await page.getByRole("button", { name: "Confirm and enable", exact: true }).click(); await page.locator(".inspection-conflict").waitFor(); } });
            await capture({ name: "r6-ambiguous-suggestion-1440-light.png", note: "Custom Study Note" });
            await capture({ name: "r6-profile-tools-1440-dark.png", note: "Japanese Vocabulary", theme: "dark", action: async (page) => { await page.locator("details.inspection-tools-disclosure summary").click(); } });

            await capture({ base: baselineBase, baseline: true, name: "r6-baseline-japanese-1440-light.png", note: "Japanese Vocabulary" });
            await capture({ base: baselineBase, baseline: true, name: "r6-baseline-programming-1440-light.png", note: "Programming Q&A" });
            await capture({ base: baselineBase, baseline: true, name: "r6-baseline-confirmed-1440-dark.png", note: "Confirmed Basic", theme: "dark" });
            await capture({ base: baselineBase, baseline: true, name: "r6-baseline-needs-review-1440-light.png", note: "Renamed Fields" });
            await capture({ base: baselineBase, baseline: true, name: "r6-baseline-long-editor-1024-light.png", note: "Japanese Vocabulary", viewport: { width: 1024, height: 900 }, action: async (page) => { const button = page.getByRole("button", { name: /Use suggestion/i }).last(); if (await button.isVisible().catch(() => false)) await button.click(); } });

            await fs.writeFile(path.join(output, "r6-visual-observations.json"), `${JSON.stringify(observations, null, 2)}\n`, "utf8");
            console.log(`Captured ${observations.length} R6 visual states.`);
          } finally {
            await browser.close();
          }
          R6_SCRIPT
      - name: Run Chromium visual matrix
        working-directory: web-dashboard
        shell: bash
        run: node r6-visual.mjs
      - name: Upload R6 browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r6-browser-evidence-${{ github.run_id }}
          path: r6-visual
          if-no-files-found: error
          retention-days: 1
