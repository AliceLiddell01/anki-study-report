name: R7 temporary Inspection Profiles browser harness control

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: r7-inspection-browser-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-inspection-browser-harness-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ github.event.pull_request.head.sha }}'
          test '${{ github.head_ref }}' = 'c1-5r-7-inspection-browser-harness-fix'
          test '${{ github.base_ref }}' = 'core'
          git cat-file -e '4c0940904bc3586a8a61706863a151a40d4dcf47^{commit}'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install focused dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Apply bounded Inspection Profiles browser repair
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          import os

          smoke = Path('docker/anki-e2e/smoke-browser.mjs')
          text = smoke.read_text(encoding='utf-8')
          sentinel = 'suggestionSourceName: "E2E Generic Basic"'
          already = sentinel in text
          if not already:
              start = 'async function assertInspectionProfilesWorkspace'
              end = 'async function captureZoomProof'
              if text.count(start) != 1 or text.count(end) != 1:
                  raise SystemExit('Inspection Profiles browser function boundaries are not unique.')
              replacement = dedent(r'''
              async function assertInspectionProfilesWorkspace(page) {
                await prepareDashboardRoute(page, "/settings/inspection-profiles", "light", "Профили проверки");
                const japanese = page.getByRole("button", { name: /E2E Japanese Vocabulary/ });
                const programming = page.getByRole("button", { name: /E2E Programming/ });
                const suggestionSource = page.getByRole("button", { name: /E2E Generic Basic/ });
                await japanese.waitFor({ state: "visible", timeout: 30000 });
                await programming.waitFor({ state: "visible", timeout: 30000 });
                await suggestionSource.waitFor({ state: "visible", timeout: 30000 });
                const listScreenshot = await saveStateScreenshot(page, "inspection-profiles", "list", "light");

                await japanese.click();
                await page.getByRole("heading", { name: "E2E Japanese Vocabulary" }).waitFor({ state: "visible", timeout: 30000 });
                const lifecycleText = await page.locator(".inspection-editor-header").innerText();
                const expectedState = label === "first" ? "Подтверждён" : "Нужна проверка";
                assertBrowser(lifecycleText.includes(expectedState), `Inspection Profiles editor shows ${expectedState}.`);
                const editorScreenshot = await saveStateScreenshot(page, "inspection-profiles", label === "first" ? "confirmed-editor" : "needs-review", "light");

                await suggestionSource.click();
                await page.getByRole("heading", { name: "E2E Generic Basic" }).waitFor({ state: "visible", timeout: 30000 });
                const sourceLifecycleText = await page.locator(".inspection-editor-header").innerText();
                assertBrowser(sourceLifecycleText.includes("Не настроен"), "Suggestion flow starts from a stable unconfigured fixture profile.");
                await page.getByRole("button", { name: "Использовать подсказку", exact: true }).click();
                await page.getByText("Есть несохранённые изменения").waitFor({ state: "visible", timeout: 10000 });
                const dirtyScreenshot = await saveStateScreenshot(page, "inspection-profiles", "dirty-suggestion", "dark");
                await page.getByRole("button", { name: "Проверить профиль", exact: true }).click();
                await page.getByRole("heading", { name: "Проверка и ограниченный пример" }).waitFor({ state: "visible", timeout: 30000 });
                const previewScreenshot = await saveStateScreenshot(page, "inspection-profiles", "validated-preview", "light");

                await programming.evaluate((element) => element.click());
                const unsavedDialog = page.getByTestId("inspection-unsaved-dialog");
                await unsavedDialog.waitFor({ state: "visible", timeout: 10000 });
                assertBrowser((await unsavedDialog.innerText()).includes("Отбросить несохранённые изменения?"), "Unsaved navigation dialog has the expected accessible title.");
                await unsavedDialog.getByRole("button", { name: "Продолжить редактирование", exact: true }).click();
                assertBrowser(await page.getByText("Есть несохранённые изменения").isVisible(), "Unsaved draft remains after cancelling note-type navigation.");
                const overflow = await page.evaluate(() => document.documentElement.scrollWidth - document.documentElement.clientWidth);
                assertBrowser(overflow <= 2, "Inspection Profiles workspace has no horizontal page overflow.");
                return {
                  expectedState,
                  suggestionSourceName: "E2E Generic Basic",
                  suggestionCreatesDirtyDraft: true,
                  validateV2PreviewVisible: true,
                  unsavedNavigationProtected: true,
                  noHorizontalOverflow: true,
                  screenshots: [listScreenshot, editorScreenshot, dirtyScreenshot, previewScreenshot],
                };
              }
              ''').strip()
              prefix, remainder = text.split(start, 1)
              _, suffix = remainder.split(end, 1)
              smoke.write_text(prefix + replacement + '\n\n' + end + suffix, encoding='utf-8', newline='\n')

              tests = Path('tests/test_docker_smoke_helpers.py')
              tests_text = tests.read_text(encoding='utf-8')
              marker = 'def test_smoke_browser_cards_workspace_uses_current_attention_inbox_contract():\n'
              if tests_text.count(marker) != 1:
                  raise SystemExit('Could not locate the exact browser regression insertion point.')
              regression = dedent(r'''
              def test_smoke_browser_inspection_profiles_uses_unconfigured_suggestion_source():
                  source = (
                      Path(__file__).resolve().parents[1] / "docker" / "anki-e2e" / "smoke-browser.mjs"
                  ).read_text(encoding="utf-8")
                  workspace = source.split("async function assertInspectionProfilesWorkspace", 1)[1].split(
                      "async function captureZoomProof", 1
                  )[0]

                  assert 'name: /E2E Japanese Vocabulary/' in workspace
                  assert 'name: /E2E Generic Basic/' in workspace
                  assert 'sourceLifecycleText.includes("Не настроен")' in workspace
                  assert 'name: "Использовать подсказку", exact: true' in workspace
                  assert 'suggestionSourceName: "E2E Generic Basic"' in workspace

                  japanese_state = workspace.index("await japanese.click()")
                  unconfigured_source = workspace.index("await suggestionSource.click()")
                  apply_suggestion = workspace.index('name: "Использовать подсказку", exact: true')
                  assert japanese_state < unconfigured_source < apply_suggestion


              ''').lstrip()
              tests.write_text(tests_text.replace(marker, regression + marker), encoding='utf-8', newline='\n')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"already_normalized={'true' if already else 'false'}\n")
          PY

      - name: Verify focused repair
        shell: bash
        run: |
          set -euo pipefail
          node --check docker/anki-e2e/smoke-browser.mjs
          python -m pytest tests/test_docker_smoke_helpers.py
          git diff --check
          python - <<'PY'
          from pathlib import Path
          text = Path('docker/anki-e2e/smoke-browser.mjs').read_text(encoding='utf-8')
          if text.count('suggestionSourceName: "E2E Generic Basic"') != 1:
              raise SystemExit('Inspection Profiles suggestion-source sentinel is incoherent.')
          PY

      - name: Normalize and push one permanent commit
        if: steps.patch.outputs.already_normalized == 'false'
        shell: bash
        run: |
          set -euo pipefail
          old_sha="$(git rev-parse HEAD)"
          test -f .r7-inspection-browser-trigger
          rm .r7-inspection-browser-trigger
          git reset --mixed '4c0940904bc3586a8a61706863a151a40d4dcf47'
          git add docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py
          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(
            docker/anki-e2e/smoke-browser.mjs
            tests/test_docker_smoke_helpers.py
          )
          printf 'actual=%s\n' "${staged[*]}"
          printf 'expected=%s\n' "${expected[*]}"
          test "${staged[*]}" = "${expected[*]}"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test: align Inspection Profiles browser smoke with profile lifecycle'
          test "$(git rev-list --count '4c0940904bc3586a8a61706863a151a40d4dcf47'..HEAD)" = '1'
          git push \
            --force-with-lease=refs/heads/c1-5r-7-inspection-browser-harness-fix:"$old_sha" \
            origin HEAD:refs/heads/c1-5r-7-inspection-browser-harness-fix

      - name: Verify normalized branch shape
        if: steps.patch.outputs.already_normalized == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test ! -e .r7-inspection-browser-trigger
          test "$(git rev-list --count '4c0940904bc3586a8a61706863a151a40d4dcf47'..HEAD)" = '1'
          mapfile -t changed < <(git diff --name-only '4c0940904bc3586a8a61706863a151a40d4dcf47' HEAD | sort)
          expected=(
            docker/anki-e2e/smoke-browser.mjs
            tests/test_docker_smoke_helpers.py
          )
          test "${changed[*]}" = "${expected[*]}"
