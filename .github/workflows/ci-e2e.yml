name: Full Docker / Anki E2E

on:
  workflow_call:
    inputs:
      mode:
        required: false
        default: standard
        type: string
      scope:
        required: false
        default: full
        type: string
      screenshot_workers:
        required: false
        default: auto
        type: string
      resource_telemetry:
        required: false
        default: true
        type: boolean
      verify_restart:
        required: false
        default: auto
        type: string
      release_artifact_name:
        required: false
        default: ""
        type: string
      release_artifact_sha256:
        required: false
        default: ""
        type: string
      fast_ci_run_id:
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      mode:
        description: E2E mode
        required: true
        default: standard
        type: choice
        options:
          - standard
          - strict-apkg
          - perf100
      scope:
        description: Product scope (targeted scopes are development gates)
        required: true
        default: full
        type: choice
        options:
          - full
          - global
          - stats
          - decks
          - activity
          - cards
          - settings
      screenshot_workers:
        description: Bounded BrowserContext workers
        required: true
        default: auto
        type: choice
        options: [auto, "1", "2", "3", "4"]
      resource_telemetry:
        description: Sample container resources
        required: true
        default: true
        type: boolean
      verify_restart:
        description: Restart policy (auto means full only)
        required: true
        default: auto
        type: choice
        options: [auto, "true", "false"]
      fast_ci_run_id:
        description: Successful Fast CI run ID; empty keeps source-build mode
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-e2e-${{ github.ref }}-${{ inputs.mode || 'standard' }}-${{ inputs.scope || 'stats' }}-${{ inputs.screenshot_workers || '3' }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Real Anki Desktop (${{ inputs.mode || 'standard' }} / ${{ inputs.scope || 'stats' }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      E2E_MODE: ${{ inputs.mode || 'standard' }}
      E2E_SCOPE: ${{ inputs.scope || 'stats' }}
      SCREENSHOT_WORKERS_INPUT: ${{ inputs.screenshot_workers || '3' }}
      RESOURCE_TELEMETRY_INPUT: ${{ inputs.resource_telemetry && 'true' || 'false' }}
      VERIFY_RESTART_INPUT: ${{ inputs.verify_restart || 'auto' }}
      RELEASE_ARTIFACT_NAME_INPUT: ${{ inputs.release_artifact_name || '' }}
      RELEASE_ARTIFACT_SHA256_INPUT: ${{ inputs.release_artifact_sha256 || '' }}
      FAST_CI_RUN_ID_INPUT: ${{ inputs.fast_ci_run_id || '' }}
      ANKI_E2E_IMAGE: anki-study-report-e2e:ci
      ANKI_VERSION: "26.05"
      # Official GitHub release asset digest for anki-26.05-linux-x86_64.tar.zst.
      ANKI_SHA256: 6223d705563f71ab40ce072a5d96a3919c546d5dde1e4c49dc27975e70067274
      ANKI_REQUIRE_SHA256: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Capture workflow source and validate package source inputs
        id: source_mode
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ci-e2e-raw | Out-Null
          $started = [DateTime]::UtcNow.ToString('o')
          "CI_E2E_STARTED_AT=$started" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "CI_E2E_PWSH_VERSION=$($PSVersionTable.PSVersion)" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "CI_E2E_EXIT_CODE=1" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "CI_E2E_ARTIFACT_EXIT_CODE=1" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_BUILD_DURATION_MS=0" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_IMAGE_SIZE_BYTES=0" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_CACHE_STATE=unavailable" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "E2E_WORKFLOW_SOURCE_SHA=${{ github.sha }}" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "E2E_WORKFLOW_SOURCE_REF=${{ github.ref }}" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "E2E_CHECKOUT_SHA=${{ github.sha }}" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          python scripts/verify_fast_ci_e2e_handoff.py validate-inputs `
            --release-artifact-name "$env:RELEASE_ARTIFACT_NAME_INPUT" `
            --release-artifact-sha256 "$env:RELEASE_ARTIFACT_SHA256_INPUT" `
            --fast-ci-run-id "$env:FAST_CI_RUN_ID_INPUT" `
            --output "$env:RUNNER_TEMP/package-source.json" `
            --github-output $env:GITHUB_OUTPUT
          if ($LASTEXITCODE -ne 0) { throw 'Invalid E2E package source inputs.' }
          $source = Get-Content "$env:RUNNER_TEMP/package-source.json" -Raw | ConvertFrom-Json
          "ANKI_E2E_PACKAGE_SOURCE=$($source.packageSource)" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve exact successful Fast CI run and artifact IDs
        id: resolve_fast_ci
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runJson = Join-Path $env:RUNNER_TEMP 'fast-ci-run.json'
          $artifactsJson = Join-Path $env:RUNNER_TEMP 'fast-ci-artifacts.json'
          gh api "repos/${{ github.repository }}/actions/runs/$env:FAST_CI_RUN_ID_INPUT" | Set-Content -LiteralPath $runJson -Encoding utf8NoBOM
          if ($LASTEXITCODE -ne 0) { throw 'Could not resolve the requested Fast CI run.' }
          gh api "repos/${{ github.repository }}/actions/runs/$env:FAST_CI_RUN_ID_INPUT/artifacts?per_page=100" | Set-Content -LiteralPath $artifactsJson -Encoding utf8NoBOM
          if ($LASTEXITCODE -ne 0) { throw 'Could not resolve artifacts for the requested Fast CI run.' }
          python scripts/verify_fast_ci_e2e_handoff.py resolve-run `
            --run-json $runJson `
            --artifacts-json $artifactsJson `
            --repository '${{ github.repository }}' `
            --run-id $env:FAST_CI_RUN_ID_INPUT `
            --output "$env:RUNNER_TEMP/fast-ci-resolution.json" `
            --github-output $env:GITHUB_OUTPUT
          if ($LASTEXITCODE -ne 0) { throw 'Fast CI source-run resolution failed.' }

      - name: Download exact Fast CI diagnostics by artifact ID
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.resolve_fast_ci.outputs.diagnostics_artifact_id }}
          path: ${{ runner.temp }}/fast-ci-diagnostics
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve_fast_ci.outputs.source_run_id }}
          merge-multiple: true
          digest-mismatch: error

      - name: Validate Fast CI diagnostics and derive tested commit
        id: fast_diagnostics
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        shell: pwsh
        run: |
          python scripts/verify_fast_ci_e2e_handoff.py validate-diagnostics `
            --resolution "$env:RUNNER_TEMP/fast-ci-resolution.json" `
            --directory "$env:RUNNER_TEMP/fast-ci-diagnostics" `
            --output "$env:RUNNER_TEMP/fast-ci-diagnostics-validated.json" `
            --github-output $env:GITHUB_OUTPUT
          if ($LASTEXITCODE -ne 0) { throw 'Fast CI diagnostics validation failed.' }

      - name: Check out exact Fast CI tested commit
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.fast_diagnostics.outputs.tested_sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Verify exact tested commit checkout
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        shell: pwsh
        env:
          EXPECTED_TESTED_SHA: ${{ steps.fast_diagnostics.outputs.tested_sha }}
        run: |
          $actual = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($LASTEXITCODE -ne 0 -or $actual -ne $env:EXPECTED_TESTED_SHA) {
            throw "Exact Fast CI tested commit checkout mismatch: $actual"
          }
          "E2E_CHECKOUT_SHA=$actual" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download exact Fast CI package by artifact ID
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ steps.resolve_fast_ci.outputs.package_artifact_id }}
          path: ${{ runner.temp }}/fast-ci-package
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve_fast_ci.outputs.source_run_id }}
          merge-multiple: true
          digest-mismatch: error

      - name: Validate and stage exact Fast CI package
        id: fast_package
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        shell: pwsh
        run: |
          python scripts/write_ci_package_metadata.py --verify-only --output-directory "$env:RUNNER_TEMP/fast-ci-package"
          if ($LASTEXITCODE -ne 0) { throw 'Stage 2 package metadata validation failed.' }
          $checkoutSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          python scripts/verify_fast_ci_e2e_handoff.py validate-package `
            --resolution "$env:RUNNER_TEMP/fast-ci-resolution.json" `
            --diagnostics "$env:RUNNER_TEMP/fast-ci-diagnostics-validated.json" `
            --directory "$env:RUNNER_TEMP/fast-ci-package" `
            --e2e-workflow-source-sha $env:E2E_WORKFLOW_SOURCE_SHA `
            --e2e-checkout-sha $checkoutSha `
            --output "$env:RUNNER_TEMP/fast-ci-handoff.json" `
            --github-output $env:GITHUB_OUTPUT
          if ($LASTEXITCODE -ne 0) { throw 'Cross-run Fast CI package validation failed.' }
          $source = Join-Path $env:RUNNER_TEMP 'fast-ci-package/anki_study_report.ankiaddon'
          New-Item -ItemType Directory -Force docker/anki-e2e/local-input | Out-Null
          Copy-Item -LiteralPath $source -Destination docker/anki-e2e/local-input/anki_study_report.ankiaddon -Force
          'ANKI_E2E_PREBUILT_ADDON_PATH=/e2e/local-input/anki_study_report.ankiaddon' | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          'ANKI_E2E_PACKAGE_SOURCE=fast-ci-artifact' | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          $handoff = Get-Content "$env:RUNNER_TEMP/fast-ci-handoff.json" -Raw | ConvertFrom-Json
          "ANKI_E2E_FAST_CI_RUN_ID=$env:FAST_CI_RUN_ID_INPUT" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_FAST_CI_TESTED_SHA=$($handoff.sourceTestedCommitSha)" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_FAST_CI_PACKAGE_SHA256=$($handoff.packageSha256)" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download exact release artifact
        if: steps.source_mode.outputs.package_source == 'release-artifact'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.release_artifact_name }}
          path: release-e2e-input

      - name: Stage and verify exact release artifact
        if: steps.source_mode.outputs.package_source == 'release-artifact'
        shell: pwsh
        env:
          EXPECTED_SHA256: ${{ inputs.release_artifact_sha256 }}
        run: |
          if (-not $env:EXPECTED_SHA256 -or $env:EXPECTED_SHA256 -notmatch '^[0-9a-f]{64}$') {
            throw 'A valid release_artifact_sha256 is required with release_artifact_name.'
          }
          $source = 'release-e2e-input/anki_study_report.ankiaddon'
          if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
            throw 'The internal release artifact does not contain anki_study_report.ankiaddon.'
          }
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $source).Hash.ToLowerInvariant()
          if ($actual -ne $env:EXPECTED_SHA256) {
            throw "Exact release artifact SHA-256 mismatch: $actual"
          }
          New-Item -ItemType Directory -Force docker/anki-e2e/local-input | Out-Null
          Copy-Item -LiteralPath $source -Destination docker/anki-e2e/local-input/anki_study_report.ankiaddon -Force
          'ANKI_E2E_PREBUILT_ADDON_PATH=/e2e/local-input/anki_study_report.ankiaddon' | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          'ANKI_E2E_PACKAGE_SOURCE=release-artifact' | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Capture runner and Docker preflight
        shell: pwsh
        run: |
          @(
            "runnerOs=$env:RUNNER_OS"
            "runnerArch=$env:RUNNER_ARCH"
            "imageOs=$env:ImageOS"
            "imageVersion=$env:ImageVersion"
            "workflowSourceSha=$env:E2E_WORKFLOW_SOURCE_SHA"
            "e2eCheckoutSha=$env:E2E_CHECKOUT_SHA"
            "packageSource=$env:ANKI_E2E_PACKAGE_SOURCE"
            "runId=$env:GITHUB_RUN_ID"
            "runAttempt=$env:GITHUB_RUN_ATTEMPT"
            "mode=$env:E2E_MODE"
            "scope=$env:E2E_SCOPE"
            "powershellVersion=$($PSVersionTable.PSVersion)"
            "--- docker version ---"
          ) | Tee-Object -FilePath ci-e2e-raw/docker-system.txt
          docker version | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          docker compose version | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          "--- cpu ---" | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          nproc | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          "--- memory ---" | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          free -h | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          "--- disk before ---" | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          df -h | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          docker info *> $null
          if ($LASTEXITCODE -ne 0) { throw "Docker daemon preflight failed." }

      - name: Validate mode and Compose contract
        shell: pwsh
        run: |
          if ($env:E2E_MODE -notin @('standard', 'strict-apkg', 'perf100')) {
            throw "Unsupported E2E mode: $env:E2E_MODE"
          }
          if ($env:E2E_SCOPE -notin @('full', 'global', 'stats', 'decks', 'activity', 'cards', 'settings')) {
            throw "Unsupported E2E scope: $env:E2E_SCOPE"
          }
          if ($env:E2E_MODE -in @('strict-apkg', 'perf100') -and $env:E2E_SCOPE -notin @('full', 'cards')) {
            throw "Mode $env:E2E_MODE requires scope=full or scope=cards."
          }
          if ($env:SCREENSHOT_WORKERS_INPUT -notin @('auto', '1', '2', '3', '4')) {
            throw "Unsupported screenshot workers: $env:SCREENSHOT_WORKERS_INPUT"
          }
          if ($env:VERIFY_RESTART_INPUT -notin @('auto', 'true', 'false')) {
            throw "Unsupported restart policy: $env:VERIFY_RESTART_INPUT"
          }
          $workers = if ($env:SCREENSHOT_WORKERS_INPUT -eq 'auto') { '3' } else { $env:SCREENSHOT_WORKERS_INPUT }
          $telemetry = if ($env:RESOURCE_TELEMETRY_INPUT -eq 'false') { '0' } else { '1' }
          $restart = switch ($env:VERIFY_RESTART_INPUT) { 'true' { '1' }; 'false' { '0' }; default { 'auto' } }
          "ANKI_E2E_SCOPE=$env:E2E_SCOPE" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_SCREENSHOT_WORKERS=$workers" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_RESOURCE_TELEMETRY=$telemetry" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_VERIFY_RESTART=$restart" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_NO_BUILD=1" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_CACHE_BACKEND=type=gha" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          docker compose -f docker/anki-e2e/docker-compose.yml config *>&1 |
            Tee-Object -FilePath ci-e2e-raw/docker-compose-config.txt
          if ($LASTEXITCODE -ne 0) { throw "docker compose config failed." }

      - name: Enable containerd image store
        shell: pwsh
        run: |
          $configPath = '/etc/docker/daemon.json'
          $config = if (Test-Path $configPath) {
            Get-Content $configPath -Raw | ConvertFrom-Json -AsHashtable
          } else {
            @{}
          }
          if (-not $config.ContainsKey('features')) { $config.features = @{} }
          $config.features['containerd-snapshotter'] = $true
          $config | ConvertTo-Json -Depth 10 | sudo tee $configPath | Out-Null
          sudo systemctl restart docker
          docker info *> $null
          if ($LASTEXITCODE -ne 0) { throw 'Docker failed after enabling the containerd image store.' }
          docker info --format '{{json .DriverStatus}}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker

      - name: Start Docker build timing
        shell: pwsh
        run: |
          "DOCKER_BUILD_STARTED_MS=$([DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds())" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and load cached E2E image
        id: docker_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/anki-e2e/Dockerfile
          load: true
          tags: anki-study-report-e2e:ci
          build-args: |
            ANKI_VERSION=26.05
            ANKI_SHA256=6223d705563f71ab40ce072a5d96a3919c546d5dde1e4c49dc27975e70067274
            ANKI_REQUIRE_SHA256=1
            ANKI_PYTHON_PACKAGE=anki==26.5
          cache-from: type=gha,scope=anki-e2e-ubuntu24-anki2605-pw1491-zstd-v1
          cache-to: type=gha,mode=max,compression=zstd,compression-level=3,force-compression=true,scope=anki-e2e-ubuntu24-anki2605-pw1491-zstd-v1

      - name: Capture Docker build telemetry
        shell: pwsh
        run: |
          $finished = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          $duration = $finished - [long]$env:DOCKER_BUILD_STARTED_MS
          $size = docker image inspect anki-study-report-e2e:ci --format '{{.Size}}'
          "ANKI_E2E_BUILD_DURATION_MS=$duration" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_IMAGE_SIZE_BYTES=$size" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "ANKI_E2E_CACHE_STATE=gha-enabled" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run canonical Docker-only E2E
        id: canonical_e2e
        shell: pwsh
        run: |
          $modeParameters = switch ($env:E2E_MODE) {
            'standard' { @{ DockerOnly = $true } }
            'strict-apkg' { @{ DockerOnly = $true; RequireApkgFixture = $true } }
            'perf100' { @{ DockerOnly = $true; RequireApkgFixture = $true; Perf100 = $true } }
            default { throw "Unsupported E2E mode: $env:E2E_MODE" }
          }
          $exitCode = 0
          try {
            & .\scripts\run_full_check.ps1 @modeParameters -E2EScope $env:ANKI_E2E_SCOPE -ScreenshotWorkers $env:ANKI_E2E_SCREENSHOT_WORKERS -NoDockerBuild *>&1 |
              Tee-Object -FilePath ci-e2e-raw/e2e-run.log
            if ($LASTEXITCODE -ne 0) { throw "Canonical E2E exited with $LASTEXITCODE" }
          } catch {
            $_ | Out-String | Tee-Object -FilePath ci-e2e-raw/e2e-run.log -Append
            $exitCode = 1
          }
          "CI_E2E_EXIT_CODE=$exitCode" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify tested release artifact hash
        if: steps.source_mode.outputs.package_source == 'release-artifact'
        shell: pwsh
        env:
          EXPECTED_SHA256: ${{ inputs.release_artifact_sha256 }}
        run: |
          $tested = 'e2e-artifacts/package/anki_study_report.ankiaddon'
          if (-not (Test-Path -LiteralPath $tested -PathType Leaf)) {
            throw 'The E2E package evidence is missing.'
          }
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $tested).Hash.ToLowerInvariant()
          if ($actual -ne $env:EXPECTED_SHA256) {
            throw "The package tested by real Anki is not the exact release artifact: $actual"
          }

      - name: Verify tested Fast CI package hash
        if: steps.source_mode.outputs.package_source == 'fast-ci-artifact'
        shell: pwsh
        env:
          EXPECTED_SHA256: ${{ steps.fast_package.outputs.package_sha256 }}
        run: |
          $tested = 'e2e-artifacts/package/anki_study_report.ankiaddon'
          if (-not (Test-Path -LiteralPath $tested -PathType Leaf)) {
            throw 'The E2E package evidence is missing.'
          }
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $tested).Hash.ToLowerInvariant()
          if ($actual -ne $env:EXPECTED_SHA256) {
            throw "The package tested by real Anki is not the exact Fast CI artifact: $actual"
          }

      - name: Publish sanitized Fast CI handoff evidence
        if: always() && steps.source_mode.outputs.package_source == 'fast-ci-artifact' && steps.fast_package.outcome == 'success'
        shell: pwsh
        run: |
          $source = Join-Path $env:RUNNER_TEMP 'fast-ci-handoff.json'
          if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
            throw 'Validated Fast CI handoff evidence is missing.'
          }
          New-Item -ItemType Directory -Force e2e-artifacts/reports | Out-Null
          Copy-Item -LiteralPath $source -Destination e2e-artifacts/reports/fast-ci-handoff.json -Force

      - name: Capture final Docker state
        if: always()
        shell: pwsh
        run: |
          "--- docker compose ps ---" | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          docker compose -f docker/anki-e2e/docker-compose.yml ps -a *>&1 |
            Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          "--- disk after ---" | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append
          df -h | Tee-Object -FilePath ci-e2e-raw/docker-system.txt -Append

      - name: Prepare redacted public E2E artifact
        if: always()
        shell: pwsh
        run: |
          $artifactExit = 0
          try {
            python scripts/prepare_ci_e2e_artifacts.py `
              --source e2e-artifacts `
              --output ci-e2e `
              --raw-logs ci-e2e-raw `
              --mode $env:E2E_MODE `
              --scope $env:ANKI_E2E_SCOPE `
              --screenshot-workers $env:ANKI_E2E_SCREENSHOT_WORKERS `
              --build-duration-ms $env:ANKI_E2E_BUILD_DURATION_MS `
              --image-size-bytes $env:ANKI_E2E_IMAGE_SIZE_BYTES `
              --cache-state $env:ANKI_E2E_CACHE_STATE `
              --e2e-exit-code $env:CI_E2E_EXIT_CODE `
              --started-at $env:CI_E2E_STARTED_AT `
              --commit-sha $env:GITHUB_SHA `
              --ref $env:GITHUB_REF `
              --package-source $env:ANKI_E2E_PACKAGE_SOURCE `
              --source-fast-ci-run-id "$env:ANKI_E2E_FAST_CI_RUN_ID" `
              --source-fast-ci-tested-sha "$env:ANKI_E2E_FAST_CI_TESTED_SHA" `
              --source-package-sha256 "$env:ANKI_E2E_FAST_CI_PACKAGE_SHA256" `
              --e2e-checkout-sha $env:E2E_CHECKOUT_SHA
            if ($LASTEXITCODE -ne 0) { throw "Artifact preparation exited with $LASTEXITCODE" }
          } catch {
            $artifactExit = 1
            Write-Error $_ -ErrorAction Continue
          }
          "CI_E2E_ARTIFACT_EXIT_CODE=$artifactExit" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Start artifact upload timing
        if: always()
        shell: pwsh
        run: |
          "ARTIFACT_UPLOAD_STARTED_MS=$([DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds())" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload redacted E2E diagnostics
        id: artifact_upload
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-e2e-${{ env.E2E_MODE }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-e2e/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Report artifact upload telemetry
        if: always()
        shell: pwsh
        env:
          ARTIFACT_ID: ${{ steps.artifact_upload.outputs.artifact-id }}
          ARTIFACT_DIGEST: ${{ steps.artifact_upload.outputs.artifact-digest }}
        run: |
          $duration = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds() - [long]$env:ARTIFACT_UPLOAD_STARTED_MS
          @(
            "## Artifact upload"
            ""
            "| Field | Value |"
            "| --- | --- |"
            "| Duration | $duration ms |"
            "| Compression level | 0 |"
            "| Artifact ID | $env:ARTIFACT_ID |"
            "| Digest | $env:ARTIFACT_DIGEST |"
          ) | Out-File $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Clean Docker E2E state
        if: always()
        shell: pwsh
        run: docker compose -f docker/anki-e2e/docker-compose.yml down -v --remove-orphans

      - name: Restore canonical result
        if: always()
        shell: pwsh
        run: |
          $e2eExit = if ($env:CI_E2E_EXIT_CODE) { [int]$env:CI_E2E_EXIT_CODE } else { 1 }
          $artifactExit = if ($env:CI_E2E_ARTIFACT_EXIT_CODE) { [int]$env:CI_E2E_ARTIFACT_EXIT_CODE } else { 1 }
          if ($e2eExit -ne 0 -or $artifactExit -ne 0) {
            throw "Full E2E failed (e2e=$e2eExit, artifact=$artifactExit)."
          }
