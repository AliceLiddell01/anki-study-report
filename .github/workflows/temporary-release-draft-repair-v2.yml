name: Temporary release draft repair v2

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/temporary-release-draft-repair-v2.yml"

permissions:
  contents: write

jobs:
  repair:
    name: Apply bounded draft lookup retries
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/release-draft-read-after-write-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Patch release automation and add tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          manager_path = Path("scripts/manage_github_release.py")
          manager = manager_path.read_text(encoding="utf-8")
          manager = replace_once(
              manager,
              "PUBLISHED_LOOKUP_DELAYS = (1, 2, 4)\n",
              "DRAFT_LOOKUP_DELAYS = (1, 2, 4)\nPUBLISHED_LOOKUP_DELAYS = (1, 2, 4)\n",
              "draft lookup delays",
          )
          manager = replace_once(
              manager,
              '''    return matches[0] if matches else None


def get_release_by_id(repo: str, release_id: int, *, expected_tag: str | None = None) -> dict[str, Any]:
          ''',
              '''    return matches[0] if matches else None


def wait_for_draft_release(repo: str, tag: str) -> dict[str, Any]:
    release = find_release(repo, tag, include_drafts=True)
    for attempt, delay in enumerate(DRAFT_LOOKUP_DELAYS, start=1):
        if release is not None:
            return release
        log_event(
            "draft-lookup-retry", repository=repo, tag=tag,
            attempt=attempt, delaySeconds=delay, reason="post-create-not-listed",
        )
        time.sleep(delay)
        release = find_release(repo, tag, include_drafts=True)
    if release is None:
        raise ReleaseError(
            f"Draft release {tag} remained unavailable from the authenticated listing "
            "after bounded post-create verification retries"
        )
    return release


def get_release_by_id(repo: str, release_id: int, *, expected_tag: str | None = None) -> dict[str, Any]:
          ''',
              "draft wait helper",
          )
          manager = replace_once(
              manager,
              '''        gh(*args)
        release = find_release(repo, tag, include_drafts=True)
        if release is None:
            raise ReleaseError(f"Draft release {tag} was created but not found by authenticated listing")
        action = "created"
          ''',
              '''        gh(*args)
        release = wait_for_draft_release(repo, tag)
        action = "created"
          ''',
              "prepare draft lookup",
          )
          manager_path.write_text(manager, encoding="utf-8", newline="\n")

          Path("tests/test_release_draft_retry.py").write_text('''from __future__ import annotations

import importlib.util
from pathlib import Path
import subprocess
import sys

import pytest

from conftest import ROOT


def load_manager():
    common_path = ROOT / "scripts" / "release_common.py"
    common_spec = importlib.util.spec_from_file_location("release_common", common_path)
    assert common_spec and common_spec.loader
    common = importlib.util.module_from_spec(common_spec)
    sys.modules[common_spec.name] = common
    common_spec.loader.exec_module(common)

    path = ROOT / "scripts" / "manage_github_release.py"
    spec = importlib.util.spec_from_file_location("manage_github_release_retry", path)
    assert spec and spec.loader
    module = importlib.util.module_from_spec(spec)
    sys.modules[spec.name] = module
    spec.loader.exec_module(module)
    return module


def completed() -> subprocess.CompletedProcess[str]:
    return subprocess.CompletedProcess(["gh"], 0, "", "")


def release_record(commit: str) -> dict:
    return {
        "id": 101,
        "tag_name": "v1.1.0",
        "name": "Anki Study Report 1.1.0",
        "draft": True,
        "prerelease": False,
        "target_commitish": commit,
        "assets": [],
    }


def test_prepare_draft_retries_listing_without_recreating(monkeypatch, tmp_path: Path) -> None:
    manager = load_manager()
    commit = "b" * 40
    created = release_record(commit)
    sequence = iter([None, None, created])
    calls = []
    sleeps = []
    monkeypatch.setattr(manager, "find_release", lambda *args, **kwargs: next(sequence))
    monkeypatch.setattr(manager, "get_release_by_id", lambda *args, **kwargs: created)
    monkeypatch.setattr(manager, "gh", lambda *args, **kwargs: calls.append(args) or completed())
    monkeypatch.setattr(manager.time, "sleep", lambda seconds: sleeps.append(seconds))
    notes = tmp_path / "release-notes.md"
    notes.write_text("notes\n", encoding="utf-8")

    release, action = manager.prepare_draft(
        "owner/repo", "v1.1.0", "Anki Study Report 1.1.0", notes, "stable", commit
    )

    assert action == "created"
    assert release["id"] == created["id"]
    assert sleeps == [1]
    assert sum(call[:2] == ("release", "create") for call in calls) == 1


def test_prepare_draft_lookup_failure_is_bounded(monkeypatch, tmp_path: Path) -> None:
    manager = load_manager()
    commit = "b" * 40
    calls = []
    sleeps = []
    monkeypatch.setattr(manager, "find_release", lambda *args, **kwargs: None)
    monkeypatch.setattr(manager, "gh", lambda *args, **kwargs: calls.append(args) or completed())
    monkeypatch.setattr(manager.time, "sleep", lambda seconds: sleeps.append(seconds))
    notes = tmp_path / "release-notes.md"
    notes.write_text("notes\n", encoding="utf-8")

    with pytest.raises(manager.ReleaseError, match="bounded post-create verification retries"):
        manager.prepare_draft(
            "owner/repo", "v1.1.0", "Anki Study Report 1.1.0", notes, "stable", commit
        )

    assert sleeps == list(manager.DRAFT_LOOKUP_DELAYS)
    assert sum(call[:2] == ("release", "create") for call in calls) == 1
''', encoding="utf-8", newline="\n")

          Path(".github/workflows/temporary-release-draft-repair-v2.yml").unlink()
          PY

          python -m pip install --disable-pip-version-check pytest
          python -m pytest tests/test_release_draft_retry.py tests/test_release_automation.py -q

      - name: Commit focused repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/manage_github_release.py tests/test_release_draft_retry.py .github/workflows/temporary-release-draft-repair-v2.yml
          git diff --cached --check
          git commit -m "fix: retry draft release discovery after creation"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
