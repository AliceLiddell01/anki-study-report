name: R7 temporary Inspection Profiles dirty-flow control

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: r7-inspection-dirty-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-inspection-dirty-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ github.event.pull_request.head.sha }}'
          test '${{ github.head_ref }}' = 'c1-5r-7-inspection-dirty-fix'
          test '${{ github.base_ref }}' = 'core'
          git cat-file -e '19f9ff935870e5f7d9f4c577d8d195c9c6a049a6^{commit}'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install focused dependencies
        shell: bash
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Apply bounded visible-control interaction repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          smoke = Path('docker/anki-e2e/smoke-browser.mjs')
          text = smoke.read_text(encoding='utf-8')
          old = '  await page.getByRole("button", { name: "Восстановить предложенную настройку", exact: true }).click();\n'
          new = (
              '  const priority = page.locator("#inspection-basic-priority-0");\n'
              '  await priority.waitFor({ state: "visible", timeout: 10000 });\n'
              '  const initialPriority = await priority.inputValue();\n'
              '  await priority.selectOption(initialPriority === "high" ? "medium" : "high");\n'
          )
          if text.count(old) != 1 or '#inspection-basic-priority-0' in text:
              raise SystemExit('Unexpected Inspection Profiles dirty-flow source state.')
          smoke.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

          tests = Path('tests/test_docker_smoke_helpers.py')
          tests_text = tests.read_text(encoding='utf-8')
          old_assert = '    assert \'name: "Восстановить предложенную настройку", exact: true\' in workspace\n'
          old_stale = '    assert \'name: "Использовать подсказку", exact: true\' not in workspace\n'
          old_index = '    apply_suggestion = workspace.index(\'name: "Восстановить предложенную настройку", exact: true\')\n'
          if tests_text.count(old_assert) != 1 or tests_text.count(old_stale) != 1 or tests_text.count(old_index) != 1:
              raise SystemExit('Unexpected Inspection Profiles regression source state.')
          replacement_asserts = (
              '    assert \'page.locator("#inspection-basic-priority-0")\' in workspace\n'
              '    assert \'initialPriority === "high" ? "medium" : "high"\' in workspace\n'
              '    assert "Восстановить предложенную настройку" not in workspace\n'
              '    assert "Использовать подсказку" not in workspace\n'
          )
          tests_text = tests_text.replace(old_assert + old_stale, replacement_asserts)
          tests_text = tests_text.replace(old_index, '    apply_suggestion = workspace.index(\'page.locator("#inspection-basic-priority-0")\')\n')
          tests.write_text(tests_text, encoding='utf-8', newline='\n')
          PY

      - name: Verify focused repair
        shell: bash
        run: |
          set -euo pipefail
          node --check docker/anki-e2e/smoke-browser.mjs
          python -m pytest tests/test_docker_smoke_helpers.py
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py)
          test "${changed[*]}" = "${expected[*]}"

      - name: Normalize and push one permanent commit
        shell: bash
        run: |
          set -euo pipefail
          old_sha="$(git rev-parse HEAD)"
          test -f .r7-inspection-dirty-trigger
          rm .r7-inspection-dirty-trigger
          git reset --mixed '19f9ff935870e5f7d9f4c577d8d195c9c6a049a6'
          git add docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py
          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py)
          test "${staged[*]}" = "${expected[*]}"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test: drive Inspection Profiles dirty state through a visible control'
          test "$(git rev-list --count '19f9ff935870e5f7d9f4c577d8d195c9c6a049a6'..HEAD)" = '1'
          git push --force-with-lease=refs/heads/c1-5r-7-inspection-dirty-fix:"$old_sha" origin HEAD:refs/heads/c1-5r-7-inspection-dirty-fix
