name: Temporary release test repair

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/temporary-release-test-repair.yml"

permissions:
  contents: write

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'release/1.1.0'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Make release tests version-aware
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          path = Path("tests/test_release_automation.py")
          text = path.read_text(encoding="utf-8")
          text = replace_once(
              text,
              '''    assert release.read_version() == "1.0.0"
              source = (ROOT / "anki_study_report" / "version.py").read_text(encoding="utf-8")
              assert "aqt" not in source
              assert "__version__ = \\"1.0.0\\"" in source
          ''',
              '''    version = release.read_version()
              assert release.SemVer.parse(version)
              source = (ROOT / "anki_study_report" / "version.py").read_text(encoding="utf-8")
              assert "aqt" not in source
              assert f'__version__ = "{version}"' in source
          ''',
              "canonical version test",
          )
          text = replace_once(
              text,
              '''    release = load_release_common()

              notes = release.release_notes("1.0.0")
              description = release.render_ankiweb_description("1.0.0")

              assert notes.rstrip() in description
              assert description.count("## What's new in 1.0.0") == 1
              assert "[Unreleased]" not in notes
          ''',
              '''    release = load_release_common()
              version = release.read_version()

              notes = release.release_notes(version)
              description = release.render_ankiweb_description(version)

              assert notes.rstrip() in description
              assert description.count(f"## What's new in {version}") == 1
              assert "## New: Search your Anki collection" in description
              assert "[Unreleased]" not in notes
          ''',
              "release notes test",
          )
          text = replace_once(
              text,
              '''    release = load_release_common()
              artifact = tmp_path / "anki_study_report.ankiaddon"
          ''',
              '''    release = load_release_common()
              version = release.read_version()
              artifact = tmp_path / "anki_study_report.ankiaddon"
          ''',
              "release validation version",
          )
          text = replace_once(
              text,
              'release.validate_release("1.0.0", "stable", artifact=artifact, check_remote_tag=False, allow_existing_tag=True)',
              'release.validate_release(version, "stable", artifact=artifact, check_remote_tag=False, allow_existing_tag=True)',
              "release validation artifact",
          )
          text = replace_once(
              text,
              'release.validate_release("1.0.0", "stable", artifact=wrong, check_remote_tag=False, allow_existing_tag=True)',
              'release.validate_release(version, "stable", artifact=wrong, check_remote_tag=False, allow_existing_tag=True)',
              "release validation wrong artifact",
          )
          text = replace_once(
              text,
              '''def test_prepared_release_check_is_read_only(tmp_path: Path):
              checkout = tmp_path / "checkout"
          ''',
              '''def test_prepared_release_check_is_read_only(tmp_path: Path):
              version = load_release_common().read_version()
              checkout = tmp_path / "checkout"
          ''',
              "prepared release version",
          )
          text = replace_once(
              text,
              '["node", "scripts/run_python.mjs", "scripts/prepare_release.py", "--version", "1.0.0", "--check"]',
              '["node", "scripts/run_python.mjs", "scripts/prepare_release.py", "--version", version, "--check"]',
              "prepared release command",
          )
          path.write_text(text, encoding="utf-8", newline="\n")

          path = Path("tests/test_ankiweb_description_layout.py")
          text = path.read_text(encoding="utf-8")
          text = replace_once(
              text,
              '''    common, description_module = load_modules()
              rendered = description_module.render_ankiweb_description("1.0.0")
              notes = common.release_notes("1.0.0").rstrip()

              assert re.search(r"(?m)^#\\s+", rendered) is None
              assert rendered.count("## What's new in 1.0.0") == 1
          ''',
              '''    common, description_module = load_modules()
              version = common.read_version()
              rendered = description_module.render_ankiweb_description(version)
              notes = common.release_notes(version).rstrip()

              assert re.search(r"(?m)^#\\s+", rendered) is None
              assert rendered.count(f"## What's new in {version}") == 1
          ''',
              "description version",
          )
          text = replace_once(
              text,
              '''    intro = rendered.index("Anki Study Report turns your Anki review data")
              support = rendered.index("## Support the author")
          ''',
              '''    intro = rendered.index("Anki Study Report turns your Anki review data")
              search = rendered.index("## New: Search your Anki collection")
              support = rendered.index("## Support the author")
          ''',
              "Search presentation order",
          )
          text = replace_once(
              text,
              'changelog = rendered.index("## What\'s new in 1.0.0")',
              'changelog = rendered.index(f"## What\'s new in {version}")',
              "description changelog marker",
          )
          text = replace_once(
              text,
              'assert intro < support < features < privacy < compatibility < links < changelog < history',
              'assert intro < search < support < features < privacy < compatibility < links < changelog < history',
              "description order",
          )
          path.write_text(text, encoding="utf-8", newline="\n")

          Path(".github/workflows/temporary-release-test-repair.yml").unlink()
          PY

          python -m pip install --disable-pip-version-check pytest
          python -m pytest tests/test_release_automation.py tests/test_ankiweb_description_layout.py -q

      - name: Commit focused release test maintenance
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_release_automation.py tests/test_ankiweb_description_layout.py .github/workflows/temporary-release-test-repair.yml
          git diff --cached --check
          git commit -m "test: make release checks version-aware"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
