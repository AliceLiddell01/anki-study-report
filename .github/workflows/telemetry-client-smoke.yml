name: Telemetry product client smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: Reviewed telemetry deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      confirm_production:
        description: Type RUN_PRODUCTION_TELEMETRY_CLIENT_SMOKE for production
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Synthetic lifecycle (${{ inputs.target }})
    runs-on: windows-2025
    timeout-minutes: 10
    environment: ${{ inputs.target == 'production' && 'telemetry-production' || 'telemetry-staging' }}
    env:
      TELEMETRY_STAGING_ENDPOINT: ${{ secrets.TELEMETRY_STAGING_ENDPOINT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Validate production confirmation
        if: inputs.target == 'production'
        shell: pwsh
        env:
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
        run: |
          if ($env:CONFIRM_PRODUCTION -cne 'RUN_PRODUCTION_TELEMETRY_CLIENT_SMOKE') {
            throw 'Production requires the exact confirmation string.'
          }

      - name: Run product urllib lifecycle
        shell: pwsh
        env:
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
        run: |
          python scripts/telemetry_client_smoke.py `
            --target '${{ inputs.target }}' `
            --confirm-production $env:CONFIRM_PRODUCTION `
            --report telemetry-client-smoke/report.json

      - name: Upload sanitized report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: telemetry-client-smoke-${{ inputs.target }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: telemetry-client-smoke/report.json
          if-no-files-found: error
          retention-days: 7
