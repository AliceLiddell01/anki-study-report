name: Gated Release Delivery

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: Exact canonical SemVer to release
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease

permissions:
  contents: read

concurrency:
  group: release-delivery-${{ github.event_name == 'workflow_dispatch' && 'publish' || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Resolve and validate release inputs
        id: release
        shell: pwsh
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_CHANNEL: ${{ inputs.channel }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { $env:DISPATCH_VERSION } else { python -c "from scripts.release_common import read_version; print(read_version())" }
          $channel = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { $env:DISPATCH_CHANNEL } else { 'stable' }
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            if ('${{ github.ref }}' -ne 'refs/heads/master') { throw 'Releases may only be dispatched from master.' }
            git fetch origin master --tags --force
            $remoteMaster = git rev-parse origin/master
            if ('${{ github.sha }}' -ne $remoteMaster) { throw 'The release commit is not the current origin/master.' }
            $tagCommit = git rev-parse --verify "refs/tags/v$version^{commit}" 2>$null
            if ($LASTEXITCODE -eq 0) {
              if ($tagCommit -ne '${{ github.sha }}') { throw 'Existing release tag points to a different commit.' }
              $endpoint = "repos/${{ github.repository }}/releases/tags/v$version"
              $existing = gh api $endpoint 2>$null
              if ($LASTEXITCODE -ne 0 -or -not (ConvertFrom-Json $existing).draft) {
                throw 'Existing release tag is not attached to a resumable draft release.'
              }
            }
          }
          python scripts/validate_release.py --version $version --channel $channel --allow-existing-tag
          if ($LASTEXITCODE -ne 0) { throw 'Release validation failed.' }
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "channel=$channel" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    name: Test and build exact release artifact
    needs: validate
    runs-on: windows-2025
    timeout-minutes: 25
    outputs:
      artifact_sha256: ${{ steps.bundle.outputs.artifact_sha256 }}
      bundle_name: ${{ steps.bundle.outputs.bundle_name }}
    steps:
      - name: Check out repository and tags
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: web-dashboard/pnpm-lock.yaml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          Push-Location web-dashboard
          pnpm install --frozen-lockfile
          Pop-Location

      - name: Run canonical non-Docker verification
        shell: pwsh
        run: .\scripts\run_full_check.ps1 -SkipDocker

      - name: Build and fingerprint release bundle
        id: bundle
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_CHANNEL: ${{ needs.validate.outputs.channel }}
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          python scripts/package_addon.py --output release-artifacts/anki_study_report.ankiaddon --check
          python scripts/package_addon.py --output release-artifacts/anki_study_report.ankiaddon --check-only
          python scripts/create_release_bundle.py --version $env:RELEASE_VERSION --channel $env:RELEASE_CHANNEL --artifact release-artifacts/anki_study_report.ankiaddon --output-dir release-artifacts --commit-sha '${{ github.sha }}' --allow-existing-tag
          if ($LASTEXITCODE -ne 0) { throw 'Release bundle creation failed.' }
          $manifest = Get-Content release-artifacts/release-manifest.json -Raw | ConvertFrom-Json
          $bundleName = 'release-bundle-${{ github.run_id }}-${{ github.run_attempt }}'
          "artifact_sha256=$($manifest.artifactSha256)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "bundle_name=$bundleName" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload internal release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.bundle.outputs.bundle_name }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 2

  real-anki-gate:
    name: Test exact artifact in real Anki Desktop
    if: github.event_name == 'workflow_dispatch'
    needs:
      - validate
      - build
    uses: ./.github/workflows/ci-e2e.yml
    permissions:
      contents: read
    with:
      mode: standard
      scope: full
      screenshot_workers: auto
      resource_telemetry: true
      verify_restart: auto
      release_artifact_name: ${{ needs.build.outputs.bundle_name }}
      release_artifact_sha256: ${{ needs.build.outputs.artifact_sha256 }}

  github-draft:
    name: Attest assets and create verified draft
    if: github.event_name == 'workflow_dispatch'
    needs:
      - validate
      - build
      - real-anki-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Download exact release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.bundle_name }}
          path: release-artifacts

      - name: Verify downloaded artifact fingerprint
        shell: pwsh
        env:
          EXPECTED_SHA256: ${{ needs.build.outputs.artifact_sha256 }}
        run: |
          $actual = (Get-FileHash -Algorithm SHA256 release-artifacts/anki_study_report.ankiaddon).Hash.ToLowerInvariant()
          if ($actual -ne $env:EXPECTED_SHA256) { throw "Release artifact hash mismatch: $actual" }

      - name: Attest exact release artifact
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-artifacts/anki_study_report.ankiaddon

      - name: Create or verify draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python scripts/manage_github_release.py draft
          --version '${{ needs.validate.outputs.version }}'
          --channel '${{ needs.validate.outputs.channel }}'
          --bundle release-artifacts
          --commit-sha '${{ github.sha }}'
          --output release-artifacts/github-draft-report.json

  ankiweb-publish:
    name: Publish stable release to existing AnkiWeb branch
    if: github.event_name == 'workflow_dispatch' && needs.validate.outputs.channel == 'stable'
    needs:
      - validate
      - build
      - github-draft
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: ankiweb-production
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: web-dashboard/pnpm-lock.yaml

      - name: Download exact release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.bundle_name }}
          path: release-artifacts

      - name: Verify publisher input fingerprint
        shell: pwsh
        env:
          EXPECTED_SHA256: ${{ needs.build.outputs.artifact_sha256 }}
        run: |
          $actual = (Get-FileHash -Algorithm SHA256 release-artifacts/anki_study_report.ankiaddon).Hash.ToLowerInvariant()
          if ($actual -ne $env:EXPECTED_SHA256) { throw "Publisher input hash mismatch: $actual" }

      - name: Install publisher runtime
        working-directory: web-dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Publish once and verify public bytes
        env:
          ANKIWEB_EMAIL: ${{ secrets.ANKIWEB_EMAIL }}
          ANKIWEB_PASSWORD: ${{ secrets.ANKIWEB_PASSWORD }}
        run: >-
          node scripts/publish_ankiweb.mjs --publish
          --version '${{ needs.validate.outputs.version }}'
          --artifact release-artifacts/anki_study_report.ankiaddon
          --description release-artifacts/ankiweb-description.md
          --description-sha256 release-artifacts/ankiweb-description.sha256
          --metadata release/ankiweb.yml
          --output release-artifacts/ankiweb-publish-report.json

      - name: Audit publisher workspace for persisted auth state
        if: always()
        shell: pwsh
        run: |
          $forbidden = Get-ChildItem -Recurse -Force -File | Where-Object { $_.Name -match 'storageState|auth\.json|cookies|trace\.zip' }
          if ($forbidden) { throw "Publisher left forbidden auth artifacts: $($forbidden.FullName -join ', ')" }

      - name: Upload sanitized publisher report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ankiweb-publish-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-artifacts/ankiweb-publish-report.json
          if-no-files-found: error
          retention-days: 7

  github-finalize:
    name: Publish verified GitHub Release
    if: >-
      always() && github.event_name == 'workflow_dispatch' &&
      needs.github-draft.result == 'success' &&
      (needs.validate.outputs.channel == 'prerelease' || needs.ankiweb-publish.result == 'success')
    needs:
      - validate
      - github-draft
      - ankiweb-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Finalize GitHub Release after every required gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python scripts/manage_github_release.py finalize
          --version '${{ needs.validate.outputs.version }}'
          --channel '${{ needs.validate.outputs.channel }}'
          --output github-finalize-report.json
