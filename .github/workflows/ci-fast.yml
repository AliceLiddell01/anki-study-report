name: Fast CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  fast:
    name: Frontend, Python and package
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref }}
          persist-credentials: true
          fetch-depth: 0

      - name: Synchronize final Stage 9 documentation sources
        if: github.head_ref == 'codex/stage9-doc-sync' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          decision = Path('docs/decision-log.md')
          text = decision.read_text(encoding='utf-8')
          start = text.index('## ADR-029:')
          replacement = '''## ADR-029: Cloud telemetry принимается через staging-first EU D1 gates без R2

### Статус

Принято.

### Контекст

Telemetry service реализован, но production endpoint нельзя включать по одному
факту готовности кода. D1 jurisdiction задаётся при создании, секреты и реальные
URL нельзя подменять placeholders или предположениями. На текущем аккаунте R2
не активирован и требует billing setup, которого у владельца нет.

### Решение

- Cloudflare inventory выполняется read-only до любых изменений.
- Staging и production получают разные EU D1, Worker и секреты.
- Deploy остаётся manual-only; workflows используют pinned action SHA,
  Environment secrets, повторные migrations и synthetic lifecycle gates.
- Production принимается только после staging, deletion residue check и
  временного D1 export/import drill в GitHub runner. SQL удаляется в том же job
  и не публикуется как artifact.
- Текущий recovery contract использует provider-managed D1 Time Travel за 7
  дней. R2 и независимые 30-дневные бэкапы удалены из активного контракта и
  перенесены в future infrastructure work.
- Add-on получает фактический Worker URL отдельным PR только после cloud
  acceptance и финализации RU/EN уведомления.

### Последствия

Кодовая готовность Stage 9.2 и эксплуатационная готовность Cloudflare — разные
статусы. Production endpoint включается только после доказанной cloud
приёмки; изменение не создаёт release дополнения. Будущее независимое backup
storage потребует отдельного инфраструктурного решения и обновления notice.

### Где смотреть

`docs/stage-9-telemetry-foundation-handoff.md`, `docs/privacy-telemetry.md`,
private repository `anki-study-report-telemetry`.
'''
          decision.write_text(text[:start] + replacement, encoding='utf-8', newline='\n')

          replacements = {
              Path('web-dashboard/src/i18n/locales/en.ts'): (
                  'Privacy Notice version: 2026-07-15.',
                  'Privacy Notice version: 2026-07-15-production.',
              ),
              Path('web-dashboard/src/i18n/locales/ru.ts'): (
                  'Версия уведомления: 2026-07-15.',
                  'Версия уведомления: 2026-07-15-production.',
              ),
          }
          for path, (old, new) in replacements.items():
              value = path.read_text(encoding='utf-8')
              if value.count(old) != 1:
                  raise SystemExit(f'{path}: expected one old notice version')
              path.write_text(value.replace(old, new), encoding='utf-8', newline='\n')
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/decision-log.md web-dashboard/src/i18n/locales/en.ts web-dashboard/src/i18n/locales/ru.ts
          git commit -m "docs: align the production telemetry contract"
          git push origin HEAD:codex/stage9-doc-sync

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: web-dashboard/pnpm-lock.yaml

      - name: Prepare diagnostics
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ci-fast/logs, ci-fast/package | Out-Null
          "CI_FAST_STARTED_AT=$([DateTime]::UtcNow.ToString('o'))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          python --version
          node --version
          pnpm --version
          $PSVersionTable.PSVersion.ToString()

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: web-dashboard
        run: pnpm install --frozen-lockfile

      - name: Run canonical fast pipeline
        id: fast_check
        shell: pwsh
        run: |
          try {
            & .\scripts\run_full_check.ps1 -SkipDocker *>&1 |
              Tee-Object -FilePath ci-fast/logs/fast-check.log
          } catch {
            $_ | Out-String | Tee-Object -FilePath ci-fast/logs/fast-check.log -Append
            throw
          }

      - name: Publish verification plan
        if: always()
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $defaultBranch = "${{ github.event.repository.default_branch }}"
          $refName = "${{ github.ref_name }}"
          $baseRef = "${{ github.base_ref }}"
          $before = "${{ github.event.before }}"

          if ($eventName -eq 'pull_request') {
            $baseBranch = if ($baseRef) { $baseRef } else { $defaultBranch }
            $base = "origin/$baseBranch"
          } elseif ($refName -ne $defaultBranch) {
            $base = "origin/$defaultBranch"
          } else {
            $base = $null
            if ($before -and $before -notmatch '^0+$') {
              git cat-file -e "${before}^{commit}" 2>$null
              if ($LASTEXITCODE -eq 0) { $base = $before }
            }
            if (-not $base) { $base = 'HEAD^' }
          }

          python scripts/plan_verification.py --base $base --head HEAD --output-dir ci-fast/verification-plan

      - name: Collect non-release package
        if: always()
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath anki_study_report.ankiaddon) {
            Copy-Item -LiteralPath anki_study_report.ankiaddon -Destination ci-fast/package/anki_study_report-ci.ankiaddon
          }

      - name: Write CI summary
        if: always()
        shell: pwsh
        env:
          FAST_CHECK_OUTCOME: ${{ steps.fast_check.outcome }}
        run: |
          $result = if ($env:FAST_CHECK_OUTCOME -eq 'success') { 'success' } else { 'failure' }
          $category = if ($env:FAST_CHECK_OUTCOME -in @('', 'skipped')) { 'environment' } else { 'unknown' }
          .\scripts\write_ci_fast_summary.ps1 `
            -Result $result `
            -FailureCategory $category `
            -StartedAt $env:CI_FAST_STARTED_AT

      - name: Upload Fast CI diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-fast-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-fast/
          if-no-files-found: error
          retention-days: 14
