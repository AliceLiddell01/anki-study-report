name: Fast CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  fast:
    name: Frontend, Python and package
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: web-dashboard/pnpm-lock.yaml

      - name: Prepare diagnostics
        shell: pwsh
        env:
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_REF: ${{ github.ref }}
          TESTED_COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          New-Item -ItemType Directory -Force ci-fast/logs, ci-fast/timing | Out-Null
          "CI_FAST_STARTED_AT=$([DateTime]::UtcNow.ToString('o'))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          python scripts/ci_fast_timing.py initialize `
            --output ci-fast/timing/fast-ci-timing.json `
            --repository $env:REPOSITORY `
            --event-name $env:EVENT_NAME `
            --ref $env:WORKFLOW_REF `
            --tested-commit-sha $env:TESTED_COMMIT_SHA `
            --run-id $env:RUN_ID `
            --run-attempt $env:RUN_ATTEMPT
          if ($LASTEXITCODE -ne 0) { throw 'Fast CI timing initialization failed.' }
          python --version
          node --version
          pnpm --version
          $PSVersionTable.PSVersion.ToString()

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python scripts/ci_fast_timing.py start --output ci-fast/timing/fast-ci-timing.json --phase-id install-python-dependencies
          if ($LASTEXITCODE -ne 0) { throw 'Python dependency timing start failed.' }
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          $commandExit = $LASTEXITCODE
          python scripts/ci_fast_timing.py finish --output ci-fast/timing/fast-ci-timing.json --phase-id install-python-dependencies --exit-code $commandExit
          $timingExit = $LASTEXITCODE
          if ($commandExit -ne 0) { exit $commandExit }
          if ($timingExit -ne 0) { throw 'Python dependency timing finish failed.' }

      - name: Install frontend dependencies
        shell: pwsh
        working-directory: web-dashboard
        run: |
          python ../scripts/ci_fast_timing.py start --output ../ci-fast/timing/fast-ci-timing.json --phase-id install-frontend-dependencies
          if ($LASTEXITCODE -ne 0) { throw 'Frontend dependency timing start failed.' }
          pnpm install --frozen-lockfile
          $commandExit = $LASTEXITCODE
          python ../scripts/ci_fast_timing.py finish --output ../ci-fast/timing/fast-ci-timing.json --phase-id install-frontend-dependencies --exit-code $commandExit
          $timingExit = $LASTEXITCODE
          if ($commandExit -ne 0) { exit $commandExit }
          if ($timingExit -ne 0) { throw 'Frontend dependency timing finish failed.' }

      - name: Run canonical fast pipeline
        id: fast_check
        shell: pwsh
        run: |
          try {
            & .\scripts\run_full_check.ps1 -SkipDocker -TimingOutput ci-fast/timing/fast-ci-timing.json *>&1 |
              Tee-Object -FilePath ci-fast/logs/fast-check.log
          } catch {
            $_ | Out-String | Tee-Object -FilePath ci-fast/logs/fast-check.log -Append
            throw
          }

      - name: Publish verification plan
        id: verification_plan
        if: always()
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python scripts/ci_fast_timing.py start --output ci-fast/timing/fast-ci-timing.json --phase-id verification-planner
          if ($LASTEXITCODE -ne 0) { throw 'Verification planner timing start failed.' }

          $eventName = $env:EVENT_NAME
          $defaultBranch = $env:DEFAULT_BRANCH
          $refName = $env:REF_NAME
          $baseRef = $env:BASE_REF
          $before = $env:EVENT_BEFORE

          if ($eventName -eq 'pull_request') {
            $baseBranch = if ($baseRef) { $baseRef } else { $defaultBranch }
            $base = "origin/$baseBranch"
          } elseif ($refName -ne $defaultBranch) {
            # Manually dispatched feature-branch runs must describe the complete branch risk,
            # not only the last synchronize/force-push delta.
            $base = "origin/$defaultBranch"
          } else {
            $base = $null
            if ($before -and $before -notmatch '^0+$') {
              git cat-file -e "${before}^{commit}" 2>$null
              if ($LASTEXITCODE -eq 0) { $base = $before }
            }
            if (-not $base) { $base = 'HEAD^' }
          }

          python scripts/plan_verification.py --base $base --head HEAD --output-dir ci-fast/verification-plan
          $commandExit = $LASTEXITCODE
          python scripts/ci_fast_timing.py finish --output ci-fast/timing/fast-ci-timing.json --phase-id verification-planner --exit-code $commandExit
          $timingExit = $LASTEXITCODE
          if ($commandExit -ne 0) { exit $commandExit }
          if ($timingExit -ne 0) { throw 'Verification planner timing finish failed.' }

      - name: Write CI summary
        id: ci_summary
        if: always()
        shell: pwsh
        env:
          FAST_CHECK_OUTCOME: ${{ steps.fast_check.outcome }}
        run: |
          python scripts/ci_fast_timing.py start --output ci-fast/timing/fast-ci-timing.json --phase-id ci-summary
          if ($LASTEXITCODE -ne 0) { throw 'CI summary timing start failed.' }
          $result = if ($env:FAST_CHECK_OUTCOME -eq 'success') { 'success' } else { 'failure' }
          $category = if ($env:FAST_CHECK_OUTCOME -in @('', 'skipped')) { 'environment' } else { 'unknown' }
          .\scripts\write_ci_fast_summary.ps1 `
            -Result $result `
            -FailureCategory $category `
            -StartedAt $env:CI_FAST_STARTED_AT
          $commandExit = $LASTEXITCODE
          python scripts/ci_fast_timing.py finish --output ci-fast/timing/fast-ci-timing.json --phase-id ci-summary --exit-code $commandExit
          $timingExit = $LASTEXITCODE
          if ($commandExit -ne 0) { exit $commandExit }
          if ($timingExit -ne 0) { throw 'CI summary timing finish failed.' }

      - name: Prepare exact Fast CI package
        id: prepare_ci_package
        if: success()
        shell: pwsh
        env:
          ARTIFACT_NAME: ci-package-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          SOURCE_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'null' }}
          TESTED_COMMIT_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python scripts/ci_fast_timing.py start --output ci-fast/timing/fast-ci-timing.json --phase-id package-metadata-write
          if ($LASTEXITCODE -ne 0) { throw 'Package metadata timing start failed.' }
          python scripts/write_ci_package_metadata.py `
            --package anki_study_report.ankiaddon `
            --output-directory ci-package `
            --repository $env:REPOSITORY `
            --event-name $env:EVENT_NAME `
            --ref $env:WORKFLOW_REF `
            --tested-commit-sha $env:TESTED_COMMIT_SHA `
            --source-head-sha $env:SOURCE_HEAD_SHA `
            --source-base-sha $env:SOURCE_BASE_SHA `
            --run-id $env:RUN_ID `
            --run-attempt $env:RUN_ATTEMPT `
            --artifact-name $env:ARTIFACT_NAME
          $commandExit = $LASTEXITCODE
          python scripts/ci_fast_timing.py finish --output ci-fast/timing/fast-ci-timing.json --phase-id package-metadata-write --exit-code $commandExit
          $timingExit = $LASTEXITCODE
          if ($commandExit -ne 0) { throw 'Fast CI package metadata generation failed.' }
          if ($timingExit -ne 0) { throw 'Package metadata timing finish failed.' }

          python scripts/ci_fast_timing.py start --output ci-fast/timing/fast-ci-timing.json --phase-id package-staged-validation
          if ($LASTEXITCODE -ne 0) { throw 'Staged package timing start failed.' }
          python scripts/package_addon.py --output ci-package/anki_study_report.ankiaddon --check-only
          $commandExit = $LASTEXITCODE
          python scripts/ci_fast_timing.py finish --output ci-fast/timing/fast-ci-timing.json --phase-id package-staged-validation --exit-code $commandExit
          $timingExit = $LASTEXITCODE
          if ($commandExit -ne 0) { throw 'Staged Fast CI package validation failed.' }
          if ($timingExit -ne 0) { throw 'Staged package timing finish failed.' }

          python scripts/ci_fast_timing.py start --output ci-fast/timing/fast-ci-timing.json --phase-id package-metadata-verify
          if ($LASTEXITCODE -ne 0) { throw 'Package metadata verification timing start failed.' }
          python scripts/write_ci_package_metadata.py --verify-only --output-directory ci-package
          $commandExit = $LASTEXITCODE
          python scripts/ci_fast_timing.py finish --output ci-fast/timing/fast-ci-timing.json --phase-id package-metadata-verify --exit-code $commandExit
          $timingExit = $LASTEXITCODE
          if ($commandExit -ne 0) { throw 'Fast CI package metadata verification failed.' }
          if ($timingExit -ne 0) { throw 'Package metadata verification timing finish failed.' }

      - name: Finalize structured timing
        id: timing_finalize
        if: always()
        shell: pwsh
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          $result = switch ($env:JOB_STATUS) {
            'success' { 'success' }
            'cancelled' { 'cancelled' }
            default { 'failure' }
          }
          python scripts/ci_fast_timing.py finalize `
            --output ci-fast/timing/fast-ci-timing.json `
            --result $result `
            --markdown-output ci-fast/timing/fast-ci-timing.md `
            --summary-output $env:GITHUB_STEP_SUMMARY
          if ($LASTEXITCODE -ne 0) { throw 'Fast CI timing finalization failed.' }
          python scripts/ci_fast_timing.py validate --output ci-fast/timing/fast-ci-timing.json
          if ($LASTEXITCODE -ne 0) { throw 'Final Fast CI timing validation failed.' }

      - name: Upload Fast CI diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-fast-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-fast/
          if-no-files-found: error
          retention-days: 14

      - name: Upload exact Fast CI package
        id: upload_ci_package
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-package-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-package/
          if-no-files-found: error
          retention-days: 7

      - name: Summarize exact Fast CI package
        if: success()
        shell: pwsh
        env:
          ARTIFACT_ID: ${{ steps.upload_ci_package.outputs.artifact-id }}
          ARTIFACT_DIGEST: ${{ steps.upload_ci_package.outputs.artifact-digest }}
        run: |
          if (-not $env:ARTIFACT_ID -or -not $env:ARTIFACT_DIGEST) {
            throw 'Package artifact upload outputs are incomplete.'
          }
          $metadata = Get-Content ci-package/package-metadata.json -Raw | ConvertFrom-Json
          @(
            '## Fast CI exact package'
            ''
            '| Field | Value |'
            '| --- | --- |'
            "| Artifact | ``$($metadata.artifactName)`` |"
            "| Artifact ID | ``$env:ARTIFACT_ID`` |"
            "| Tested commit | ``$($metadata.testedCommitSha)`` |"
            "| Source head | ``$($metadata.sourceHeadSha)`` |"
            "| Package SHA-256 | ``$($metadata.packageSha256)`` |"
            "| GitHub artifact digest | ``$env:ARTIFACT_DIGEST`` |"
            '| Retention | 7 days |'
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8
