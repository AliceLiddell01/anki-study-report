name: Fast CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  inspect-stage9-doc-checks:
    if: github.head_ref == 'codex/read-stage9-pr-checks'
    name: Inspect Stage 9 documentation checks
    runs-on: ubuntu-24.04
    steps:
      - name: Read checks for PR 30
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh pr checks 30 --repo "$GITHUB_REPOSITORY" --json name,state,bucket,link,workflow

  fast:
    if: github.head_ref != 'codex/read-stage9-pr-checks'
    name: Frontend, Python and package
    runs-on: windows-2025
    steps:
      - run: echo "Canonical Fast CI remains unchanged on master and PR 30."
