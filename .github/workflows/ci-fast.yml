name: Fast CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  dispatch-final-stage9-master-ci:
    if: github.head_ref == 'codex/dispatch-final-stage9-master-ci'
    name: Dispatch final Stage 9 master Fast CI
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch canonical workflow on exact final master
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ecdf2f59eb51841042d968be019de3185c613a36
        shell: bash
        run: |
          gh workflow run ci-fast.yml --repo "$GITHUB_REPOSITORY" --ref master
          for attempt in {1..12}; do
            runs="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow ci-fast.yml --branch master --event workflow_dispatch --limit 10 --json databaseId,headSha,status,createdAt)"
            run_id="$(printf '%s' "$runs" | jq -r --arg sha "$EXPECTED_SHA" '[.[] | select(.headSha == $sha)][0].databaseId // empty')"
            if [ -n "$run_id" ]; then
              echo "Dispatched final master Fast CI run ID: $run_id"
              exit 0
            fi
            sleep 5
          done
          echo "The exact final-master Fast CI run was not found after dispatch." >&2
          exit 1

  fast:
    if: github.head_ref != 'codex/dispatch-final-stage9-master-ci'
    name: Frontend, Python and package
    runs-on: windows-2025
    steps:
      - run: echo "Canonical Fast CI remains unchanged on master."
