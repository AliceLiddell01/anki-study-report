name: Fast CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare-stage9-doc-closure:
    if: github.head_ref == 'codex/prepare-stage9-doc-closure'
    name: Prepare Stage 9 closure docs
    runs-on: ubuntu-24.04
    steps:
      - name: Check out automation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: codex/prepare-stage9-doc-closure
          path: automation
          persist-credentials: false
          show-progress: false
      - name: Check out documentation branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: codex/finalize-stage9-docs
          path: work
          fetch-depth: 0
          persist-credentials: true
          show-progress: false
      - name: Apply and publish closure documentation
        shell: bash
        run: |
          python automation/.github/scripts/finalize_stage9_docs.py work
          cd work
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/decision-log.md docs/stage-9-telemetry-foundation-handoff.md
          git commit -m "docs: finalize the Stage 9 telemetry handoff"
          git push origin HEAD:codex/finalize-stage9-docs

  fast:
    if: github.head_ref != 'codex/prepare-stage9-doc-closure'
    name: Frontend, Python and package
    runs-on: windows-2025
    steps:
      - run: echo "Canonical Fast CI remains unchanged on master."
