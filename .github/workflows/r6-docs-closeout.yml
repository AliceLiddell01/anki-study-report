name: R6 documentation closeout

on:
  push:
    branches:
      - c1-5r-6-guided-inspection-profiles

permissions:
  contents: write

concurrency:
  group: r6-docs-closeout
  cancel-in-progress: false

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: c1-5r-6-guided-inspection-profiles
          fetch-depth: 0
      - name: Write current contracts and evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def write(path: str, content: str) -> None:
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(dedent(content).strip() + "\n", encoding="utf-8")

          def append_once(path: str, marker: str, content: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if marker not in text:
                  target.write_text(text.rstrip() + "\n\n" + dedent(content).strip() + "\n", encoding="utf-8")

          write("docs/guided-inspection-profiles.md", r'''
          # Guided Inspection Profiles

          This document is the current product and interaction contract for
          `#/settings/inspection-profiles` after C1.5R.6.

          ## Product purpose

          Inspection Profiles answer five normal-user questions:

          1. What content should be present in cards from this exact note type?
          2. Which exact Anki fields represent those purposes?
          3. Which bounded declarative checks will run?
          4. Can the proposed setup be safely enabled?
          5. Why did a previously enabled profile become non-authoritative?

          The page is a local settings surface. It never edits the collection and never
          executes arbitrary code, queries, regular expressions, JavaScript, Python or SQL.

          ## Generated draft

          Selecting a `not_configured` note type immediately materializes the backend's
          deterministic suggestion as a browser-only strict v1 profile draft.

          ```text
          select exact note type
          -> generated draft appears
          -> no save request
          -> no confirmation
          -> no authoritative inspection
          ```

          There is no normal-path `Use suggestion` step.

          Generated draft and user work are distinct states:

          ```text
          origin: generated
          userEdited: false
          dirty: false
          ```

          A clean generated draft may be discarded on note-type switch or rebuilt after a
          fresh catalog query. The first Basic or Advanced profile edit changes ownership to
          user work. Imported and start-empty drafts are user-owned immediately. Only real
          user work arms the selection guard and `beforeunload` protection.

          Stored `suggested`, `confirmed`, `needs_review` and `disabled` profiles load as
          clean stored baselines. No state is auto-saved or auto-confirmed.

          ## Normal information architecture

          The selected workspace is ordered as follows:

          ```text
          exact note-type header
          lifecycle guidance
          Suggested setup
          Fields used
          Requirements
          Card scope
          validation/sample result
          state-aware primary actions
          Advanced settings disclosure
          Profile tools disclosure
          ```

          Basic is open by default. Advanced and Profile tools are collapsed by default.
          There is one strict profile draft; Basic is a friendly projection over it rather
          than a second persisted model.

          ## Friendly roles

          Known roles use localized human labels and short purposes, for example Word,
          Meaning, Example, Part of speech, Pitch accent, Audio, Image, Question, Answer,
          Code and Explanation. Exact field names come from the selected note type.
          Ordinals and role slugs do not appear in Basic.

          A field already claimed by another single-field role is disabled in the relevant
          selector. The page never silently duplicates a conflicting field claim. Unknown
          roles use a safe humanized custom-role fallback and retain their exact strict
          mapping.

          ## Friendly requirements

          Basic projects every Inspection Profile v1 check kind:

          - `non_empty` -> selected field is required;
          - `contains_audio` -> audio marker is required;
          - `contains_image` -> image marker is required;
          - `min_text_length` -> bounded minimum character count;
          - `one_of_roles_non_empty` -> at least one selected role is filled;
          - `all_roles_non_empty` -> every selected role is filled.

          The user can change friendly priority, role selection and minimum length; add a
          supported hard-coded requirement kind; and remove a requirement. Check IDs remain
          stable internal identifiers and are not regenerated during ordinary edits.

          ## Japanese and Programming expectations

          The frontend uses `suggestion.detectedKind` and the exact backend suggestion. It
          does not infer study kind from the note-type display name.

          A Japanese vocabulary suggestion with a mapped Audio role visibly contains an
          Audio requirement in Basic. A Programming suggestion visibly contains Question
          and Answer requirements and does not invent an Audio requirement. The safe
          Add-requirement selector may still offer the supported Audio check kind; this does
          not mean Audio is configured by default.

          ## Card scope

          Empty `templateOrdinals` means all card templates. Basic displays template names,
          never ordinal-first copy. A one-template note type uses a compact read-only summary.
          A missing selected template is a blocking review error and is never silently reset.

          ## Lifecycle actions

          | Effective state | Normal primary behavior |
          | --- | --- |
          | `not_configured` | Confirm and enable; generated draft may also be saved as draft |
          | `suggested` | Confirm and enable; dirty changes may be saved |
          | `confirmed`, unchanged | Enabled status; no redundant confirmation |
          | `confirmed`, edited | Validate and confirm changes |
          | `needs_review` | Review and confirm again |
          | `disabled` | Review and enable |

          Saving an edited confirmed profile as `suggested` requires confirmation because it
          removes authority. Disable and delete remain explicit confirmed tools.

          ## Validation and sample

          `Check setup` sends validate request schema v2 with a bounded sample limit of 10.
          Confirmation validates before update schema v1 and sends no mutation after an
          invalid result. The result groups failures by friendly requirement, not check ID.

          The UI may show counts, exact mapped field names, marker presence, bounded text
          length and sibling impact. It never shows raw note values, card HTML, template
          source, media filenames, filesystem paths or tokens.

          A structurally valid profile with no available cards is reported honestly as a
          structurally valid setup without a content sample.

          ## Advanced and hidden errors

          Advanced preserves display name, exact template scope, role slugs, exact field
          references, check kinds, priorities, modes, minimum lengths and stable IDs.
          Basic and Advanced edit the same strict document.

          Validation errors associated with collapsed Advanced controls are represented by
          an error count in the disclosure summary and by the page error summary. An explicit
          failed Check/Confirm action focuses the summary; activating its link opens Advanced
          before focusing the exact control.

          ## Conflict and reload

          Reads remain AbortController/latest-wins. Mutations remain serialized. A revision
          conflict preserves the user draft, refreshes server catalog state separately and
          exposes explicit review-server or discard-and-reload choices. The client never
          retries a conflicting mutation or overwrites the latest server revision silently.

          ## Accessibility

          The page has one `h1`; native catalog buttons; visible labels; fieldset/legend
          groups; native selects and checkboxes; keyboard-operable native disclosures;
          programmatic open state; status/alert semantics; and focus movement only after an
          explicit failed action or modal interaction. State and priority are expressed in
          text rather than color alone. RU and EN use the same strict data model.

          ## Security and privacy

          The frontend has no collection access. It uses only token-protected loopback APIs.
          Basic compiles exclusively to the existing hard-coded v1 union. Import remains
          strict data (maximum 1 MiB), exact-note-type/fingerprint/reference bound, dirty and
          non-authoritative until explicit confirmation. Export contains only the stored
          local profile document.

          ## Stage boundary

          C1.5R.6 verifies the guided page on deterministic fixtures and Chromium. It does not
          claim owner product acceptance and does not run Docker/real-Anki integration. The
          integrated package and owner review belong to C1.5R.7. C1.6 remains blocked.
          ''')

          write("docs/inspection-profiles-ui.md", r'''
          # Inspection Profiles settings UI

          Current route:

          ```text
          #/settings/inspection-profiles
          ```

          The authoritative interaction contract is
          [Guided Inspection Profiles](guided-inspection-profiles.md). The strict persisted
          format remains [Inspection Profiles v1](inspection-profiles-v1.md).

          ## Page contour

          The page keeps the Settings sidebar, compact state summary and searchable catalog.
          It does not auto-select an arbitrary note type. Rich catalog entries remain native
          buttons and expose note-type name, effective state, friendly detected kind and
          field/template counts.

          Selecting an unconfigured type creates a deterministic browser-only generated
          draft immediately. Opening or switching a clean generated draft is not unsaved
          user work. There is no normal-path `Use suggestion` action.

          ## Basic

          Basic is open by default and contains:

          1. friendly suggested-setup summary and confidence category;
          2. exact Anki field mappings shown through friendly roles;
          3. friendly requirements projected over every strict v1 check kind;
          4. friendly card-template scope;
          5. bounded validation/sample result;
          6. one lifecycle-aware primary action.

          Basic never displays role slugs, template ordinals or stable check IDs. It never
          creates a second persisted model.

          ## Advanced and tools

          Advanced is a native disclosure containing the strict editors and machine-level
          identifiers. Profile tools is a separate disclosure containing import, export,
          deterministic reset, start empty, disable and delete. These tools do not compete
          visually with confirmation.

          Hidden Advanced errors are represented outside the collapsed panel. Explicit
          failed validation focuses the error summary; links reveal and focus strict controls.

          ## Persistence and authority

          - no autosave;
          - no autoconfirm;
          - validate v2 before confirmed update v1;
          - only `confirmed` and structurally current profiles are authoritative;
          - `needs_review` and `disabled` fail closed;
          - revision conflicts preserve the local user draft.

          ## Responsive target

          The primary target is desktop/laptop. The catalog/editor split is used at wide
          sizes and stacks at 1024 px without horizontal overflow. Advanced remains collapsed
          so the normal path is not dominated by the strict editor.

          ## Verification boundary

          C1.5R.6 covers deterministic component/hook/projection tests, backend regression,
          typecheck, production build, package validation, canonical non-Docker verification
          and a real Chromium light/dark matrix. Docker/real-Anki and owner-private-profile
          acceptance belong to C1.5R.7.
          ''')

          write("reports/core/c1-5r-6-guided-inspection-profiles-ux.md", r'''
          # C1.5R.6 — Guided Inspection Profiles UX

          ## Status before merge

          ```text
          C1.5R.0–R.6 — technically verified
          C1.5R.7 — blocked until R6 merge/cleanup
          C1.6 — blocked
          Owner product acceptance — pending
          ```

          Final merge and cleanup evidence is appended after the PR merge.

          ## Baseline

          - initial `core`: `cbdeadcc46a3cfd3a923521f7c08996337991f3b`;
          - `core` relative to `master`: 0 behind / 83 ahead;
          - task branch: `c1-5r-6-guided-inspection-profiles`;
          - local clone/worktree: unavailable because the execution container could not
            resolve `github.com`; implementation and verification used the GitHub connector
            and disposable GitHub-hosted runners;
          - PR: #50, task branch -> `core`, non-draft.

          The baseline selected an unconfigured type with `draft == null`, displayed a
          machine-first suggestion panel and required a separate `Use suggestion` action.
          Confirmed/review profiles mounted display name, template scope, raw mappings, raw
          checks and all tools in one permanently expanded flow.

          Baseline screenshots outside Git:

          - `r6-baseline-japanese-1440-light.png` — 1192 px page;
          - `r6-baseline-programming-1440-light.png` — 1192 px;
          - `r6-baseline-confirmed-1440-dark.png` — 2162 px;
          - `r6-baseline-needs-review-1440-light.png` — 2260 px;
          - `r6-baseline-long-editor-1024-light.png` — 6436 px.

          Exact baseline control counts were not retained by the browser harness and are not
          reconstructed from screenshots.

          ## Sources actually read

          Project sources included README, AI handoff, roadmap/root and roadmap/core,
          C1.5R.0–R.5 reports, remediation report, Inspection Profiles v1/UI, Cards/Triage/
          formatter contracts, API, architecture, frontend map, navigation, localization,
          security, test/verification/release contracts, Docker E2E README, package metadata,
          the page, hook, editors, API/types/locales/styles/router, backend profile runtime,
          store/service/note intelligence, focused Python tests and browser harness.

          External primary-source checks covered the current Anki Manual note types, fields,
          templates and template errors, plus W3C WAI forms, grouping, instructions,
          validation, disclosure and notification guidance.

          ## Component topology

          Before:

          ```text
          InspectionProfilesSettingsPage
          -> SuggestionPanel
          -> display name
          -> TemplateScopeEditor
          -> FieldMappingsEditor
          -> ChecksEditor
          -> check-ID-first preview
          -> all actions
          ```

          After:

          ```text
          InspectionProfilesSettingsPage
          -> lifecycle header/guidance
          -> BasicProfileEditor
             -> suggested setup
             -> friendly field mappings
             -> friendly requirements
             -> friendly template scope
          -> ProfileValidationResult
          -> lifecycle primary actions
          -> AdvancedProfileDisclosure
             -> existing strict editors
          -> Profile tools disclosure
          ```

          ## Draft-state model

          The hook now tracks strict draft, protected baseline, explicit origin and
          `userEdited` separately. Origins are `none`, `generated`, `stored`, `imported` and
          `empty`. Dirty means user-owned changes differ from the protected baseline.

          - clean generated drafts switch/rebuild without a discard modal;
          - opening the page does not arm `beforeunload`;
          - any Basic or Advanced profile edit becomes protected user work;
          - import/start-empty are dirty immediately;
          - clean stored profiles reload from server;
          - dirty reload preserves user work;
          - latest-wins reads, validation abort, mutation serialization and exact expected
            revision remain intact;
          - conflicts preserve the local draft and expose explicit reconciliation.

          ## Product decisions

          Basic is the normal path and is one projection over strict v1. Friendly roles and
          every existing check kind are editable without exposing slugs/IDs. Duplicate field
          claims are prevented. Template names replace ordinal-first copy. Machine-level
          editing, diagnostics and IDs remain available in collapsed Advanced. Import/export,
          reset, start-empty, disable and delete are separated into Profile tools.

          Japanese uses backend `detectedKind`/suggestion and visibly includes Audio when
          mapped. Programming displays Question/Answer and does not invent an Audio default.
          No frontend note-type-name heuristic was introduced.

          ## Lifecycle and validation

          Unconfigured/suggested profiles use Confirm and enable. Confirmed unchanged shows
          Enabled. Confirmed edits validate/reconfirm; saving as draft requires confirmation.
          Needs-review profiles explain the structural reason and remain fail closed until
          reconfirmed. Disabled profiles require review/validation before enable.

          Check setup sends validate v2 sample limit 10. Confirm validates before update v1
          and sends no mutation after invalid validation. Results group failures by friendly
          requirement and remain privacy-safe. No-card samples are reported honestly.

          ## Accessibility

          Basic groups controls with fieldset/legend, uses native selects/checkboxes and
          visible labels, and keeps catalog entries as native buttons. Native disclosures are
          keyboard-operable. Collapsed Advanced reports an error count. Explicit failed
          actions focus the error summary and links reveal strict controls. Status, alert,
          state and priority semantics are textual. RU/EN share the same strict model.

          ## Security review

          Confirmed unchanged:

          ```text
          no direct collection access
          no raw note values or HTML
          no template source or media filenames
          no filesystem paths or tokens
          no arbitrary code/query/regex surface
          no autosave or autoconfirm
          no unvalidated enable
          no silent revision overwrite
          no profile-content telemetry
          ```

          Basic emits only the hard-coded Inspection Profile v1 union.

          ## Verification

          Tested implementation/content head before temporary visual infrastructure:
          `5c0b3e64b7da8d953c79fe99255a9ec65a435d2d`.

          Canonical verification run `29747390152` on exact head:

          | Contour | Result | Duration |
          | --- | --- | --- |
          | Page test | PASS | individual duration not exposed by connector |
          | Hook test | PASS | not separately exposed |
          | Basic editor test | PASS | not separately exposed |
          | Advanced disclosure test | PASS | not separately exposed |
          | Validation-result test | PASS | not separately exposed |
          | Projection test | PASS | not separately exposed |
          | Inspection API regression | PASS | not separately exposed |
          | TypeScript typecheck | PASS | not separately exposed |
          | Production `build:addon` and bundle guard | PASS | not separately exposed |
          | Focused backend | PASS — 71 tests | not separately exposed |
          | Package `--check` and `--check-only` | PASS | not separately exposed |
          | `run_full_check.ps1 -SkipDocker` | PASS | not separately exposed |
          | Git hygiene | PASS | not separately exposed |

          The connector did not expose reliable per-step durations, so none are invented.

          Browser run `29749495305`, artifact `8463904480`, digest
          `sha256:de8ce6c6927bd1917014644b76515fd73438549831ca9def940aca08b92b627f`:

          - 20 baseline/current states captured in real Chromium;
          - light/dark and 1440/1024 covered;
          - no horizontal overflow assertion failures;
          - Advanced collapsed initially;
          - no current normal-path `Use suggestion`;
          - generated draft visible without mutation;
          - Japanese Audio visible;
          - Programming configured requirements contain no Audio;
          - no Basic check ID or role slug;
          - one primary action;
          - collapsed Advanced error represented.

          Current page heights:

          | State | Viewport | Theme | Height |
          | --- | ---: | --- | ---: |
          | Japanese Basic | 1440x1000 | light/dark | 2546 px |
          | Programming Basic | 1440x1000 | light | 1965 px |
          | Programming Basic | 1024x900 | light | 3147 px |
          | Confirmed | 1440x1000 | light | 1529 px |
          | Confirmed edited | 1440x1000 | light | 1579 px |
          | Needs review | 1440x1000 | light | 1562 px |
          | Disabled | 1440x1000 | dark | 1541 px |
          | Advanced open | 1440x1000 | light | 6819 px |
          | Validation success/errors | 1440x1000 | light | 2758/2862 px |
          | Preview unavailable | 1024x900 | light | 3386 px |
          | Conflict | 1440x1000 | light | 2884 px |
          | Ambiguous | 1440x1000 | light | 1654 px |
          | Profile tools | 1440x1000 | dark | 2613 px |

          The Advanced-open height is intentional strict capability; it is collapsed in the
          normal path. Screenshots, logs, runtime harnesses and packages were not committed.

          ## Performance evidence

          Browser assertions recorded zero mutation calls before explicit actions. Selection
          and catalog load perform no validation and no mutation. The hook performs one
          bounded catalog query rather than per-note-type requests. Only the selected editor
          renders. Basic is materially shorter than the old 1024 strict editor; exact DOM
          control counts and render timings were not measured and are not invented.

          ## Failures and fixes

          - setup-node cache lookup before corepack: temporary workflow fixed;
          - combined PowerShell Vitest argument composition: replaced with explicit test
            steps; all focused files passed;
          - flaky jsdom native-details auto-toggle assertion: changed to controlled open-state
            coverage, production unchanged;
          - test-only `Array.at` exceeded project target: replaced with compatible indexing;
          - missing pytest and missing built dashboard assets: runner dependency/order fixed;
          - browser startup subshell path: temporary runner fixed;
          - Playwright strict locators, safe Audio-option distinction and expected DEV 404
            noise: harness assertions narrowed without weakening product assertions;
          - legacy baseline lacked Basic by design: baseline wait used the legacy contract.

          ## Durable changed area

          Durable production changes are limited to the Inspection Profiles page, hook,
          guided components/projection helper, focused tests and dedicated styles, plus
          synchronized current documentation. No backend production/schema change occurred.

          ## Not verified in R6

          - Docker / real-Anki E2E;
          - owner private profile;
          - owner product acceptance;
          - R7 integrated package;
          - C1.6.

          These belong to the next stage and are not upgraded into claims.

          <!-- R6_FINAL_CLOSEOUT -->
          ''')

          append_once("docs/README.md", "guided-inspection-profiles.md", r'''
          ## C1.5R.6 guided Inspection Profiles

          See [`guided-inspection-profiles.md`](guided-inspection-profiles.md). Unconfigured
          note types now open as clean generated drafts; Basic is the normal path and strict
          v1 editing remains behind Advanced.
          ''')
          index = Path("docs/README.md").read_text(encoding="utf-8")
          index = index.replace("- [Inspection Profiles settings UI](inspection-profiles-ui.md)\n", "- [Inspection Profiles settings UI](inspection-profiles-ui.md)\n- [Guided Inspection Profiles](guided-inspection-profiles.md)\n")
          Path("docs/README.md").write_text(index, encoding="utf-8")

          append_once("docs/inspection-profiles-v1.md", "## Guided editor projection", r'''
          ## Guided editor projection

          The C1.5R.6 UI does not define a second schema. A generated browser-only suggestion,
          Basic controls and Advanced controls all edit one exact v1 document. Generated
