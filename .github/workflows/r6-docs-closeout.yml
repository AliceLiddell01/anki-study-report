      - name: Remove disposable R6 infrastructure
        shell: bash
        run: |
          rm -f .github/workflows/r6-temporary-verification.yml
          rm -f .github/workflows/r6-visual-retry.yml
          rm -f .github/workflows/r6-docs-closeout.yml
      - name: Commit closeout
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --check
          test ! -e .github/workflows/r6-temporary-verification.yml
          test ! -e .github/workflows/r6-visual-retry.yml
          test ! -e .github/workflows/r6-docs-closeout.yml
          git add docs roadmap reports docker .github/workflows
          git commit -m "docs: close the guided Inspection Profiles milestone"
          git push origin HEAD:c1-5r-6-guided-inspection-profiles
