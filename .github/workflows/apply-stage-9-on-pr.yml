name: Apply Stage 9 patch on PR

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/finish-stage-9-production-telemetry' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: codex/finish-stage-9-production-telemetry
          fetch-depth: 0
          show-progress: false
      - name: Extract and apply reviewed patch
        id: apply_patch
        shell: bash
        run: |
          python - <<'PYEXTRACT'
          from pathlib import Path
          workflow = Path('.github/workflows/apply-stage-9-completion.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          script = script.replace(
              '        <details className="privacy-disclosure">\n<summary>{t("privacy.notice.technicalDetails")}</summary>\n<p>{t("privacy.notice.processorDetails")}</p>\n        </details>',
              '        <details className="privacy-disclosure">\n          <summary>{t("privacy.notice.technicalDetails")}</summary>\n          <p>{t("privacy.notice.processorDetails")}</p>\n        </details>',
          )
          Path('/tmp/apply_stage9.py').write_text(script, encoding='utf-8')
          PYEXTRACT
          set +e
          python /tmp/apply_stage9.py > apply-stage9.log 2>&1
          status=$?
          set -e
          cat apply-stage9.log
          if [ "$status" -ne 0 ]; then exit "$status"; fi
          python - <<'PYFIX'
          from pathlib import Path
          path = Path('web-dashboard/src/components/PrivacyNoticeContent.tsx')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'import { useTranslation } from "react-i18next";',
              'import type { ReactNode } from "react";\nimport { useTranslation } from "react-i18next";',
          ).replace('children: React.ReactNode', 'children: ReactNode')
          path.write_text(text, encoding='utf-8', newline='\n')
          PYFIX
          git diff --check
      - name: Upload patch diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stage-9-patch-diagnostics
          path: apply-stage9.log
          retention-days: 1
      - name: Commit reviewed changes
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add anki_study_report tests web-dashboard/src
          git commit -m "feat: activate consent-gated production telemetry"
          git push origin HEAD:codex/finish-stage-9-production-telemetry
