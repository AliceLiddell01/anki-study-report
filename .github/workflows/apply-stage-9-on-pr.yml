name: Apply Stage 9 patch on PR

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/finish-stage-9-production-telemetry' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: codex/finish-stage-9-production-telemetry
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.13.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Extract and apply reviewed patch
        shell: bash
        run: |
          python - <<'PYEXTRACT'
          from pathlib import Path
          workflow = Path('.github/workflows/apply-stage-9-completion.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/apply_stage9.py').write_text(script, encoding='utf-8')
          PYEXTRACT
          python /tmp/apply_stage9.py
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run focused frontend verification
        working-directory: web-dashboard
        run: |
          pnpm exec vitest run src/components/PrivacyNoticeContent.test.tsx src/components/ProductNoticeCoordinator.test.tsx src/pages/PrivacySettingsPage.test.tsx
          pnpm run typecheck
          pnpm run build
      - name: Run focused Python and package verification
        run: |
          node scripts/run_python.mjs -m pytest tests/test_product_notices.py tests/test_telemetry_contract.py tests/test_telemetry_client.py tests/test_dashboard_server.py -q
          node scripts/run_python.mjs -m compileall -q anki_study_report
          find anki_study_report -type d -name __pycache__ -prune -exec rm -rf {} +
          node scripts/run_python.mjs scripts/package_addon.py --check
          node --check docker/anki-e2e/smoke-browser.mjs
          git diff --check
      - name: Commit reviewed changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add anki_study_report tests web-dashboard/src
          git commit -m "feat: activate consent-gated production telemetry"
          git push origin HEAD:codex/finish-stage-9-production-telemetry
