name: Apply Stage 9 patch on PR

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/finish-stage-9-production-telemetry' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: codex/finish-stage-9-production-telemetry
          fetch-depth: 0
      - name: Extract and apply reviewed patch
        shell: bash
        run: |
          python - <<'PYEXTRACT'
          from pathlib import Path
          workflow = Path('.github/workflows/apply-stage-9-completion.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/apply_stage9.py').write_text(script, encoding='utf-8')
          PYEXTRACT
          python /tmp/apply_stage9.py
          git diff --check
      - name: Commit reviewed changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add anki_study_report tests web-dashboard/src
          git commit -m "feat: activate consent-gated production telemetry"
          git push origin HEAD:codex/finish-stage-9-production-telemetry
