name: R7 temporary package diagnostic

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: r7-package-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-integrated-acceptance-v2'
    runs-on: windows-2025
    timeout-minutes: 35
    env:
      OWNER_REVIEW_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Check out trusted controls
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: r7-control
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: web-dashboard/pnpm-lock.yaml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          Push-Location web-dashboard
          pnpm install --frozen-lockfile
          Pop-Location

      - name: Run canonical non-Docker verification
        shell: pwsh
        run: |
          & .\scripts\run_full_check.ps1 -SkipDocker
          if ($LASTEXITCODE -ne 0) { throw 'Canonical non-Docker verification failed.' }

      - name: Capture package helper result
        id: helper
        shell: pwsh
        env:
          ARTIFACT_NAME: r7-package-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          New-Item -ItemType Directory -Force r7-package-diagnostic | Out-Null
          python scripts/package_addon.py --output anki_study_report.ankiaddon --check-only
          if ($LASTEXITCODE -ne 0) { throw 'Package validation failed before helper.' }
          Remove-Item r7-package, r7-provenance -Recurse -Force -ErrorAction SilentlyContinue
          $exitCode = 0
          python r7-control/scripts/r7_prepare_package.py `
            --package anki_study_report.ankiaddon `
            --package-directory r7-package `
            --provenance-directory r7-provenance `
            --repository '${{ github.repository }}' `
            --ref '${{ github.ref }}' `
            --tested-sha $env:OWNER_REVIEW_SHA `
            --source-base-sha '${{ github.event.pull_request.base.sha }}' `
            --run-id '${{ github.run_id }}' `
            --run-attempt '${{ github.run_attempt }}' `
            --artifact-name $env:ARTIFACT_NAME *>&1 | Tee-Object r7-package-diagnostic/package.log
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          [ordered]@{
            schemaVersion = 1
            candidateSha = $env:OWNER_REVIEW_SHA
            controlSha = '${{ github.event.pull_request.base.sha }}'
            helperExitCode = $exitCode
          } | ConvertTo-Json | Set-Content r7-package-diagnostic/summary.json -Encoding utf8NoBOM

      - name: Upload bounded diagnostic
        id: upload
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r7-package-diagnostic-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: r7-package-diagnostic/
          if-no-files-found: error
          retention-days: 3
          compression-level: 9

      - name: Restore helper result
        if: always()
        shell: pwsh
        run: |
          if ('${{ steps.helper.outputs.exit_code }}' -ne '0') {
            throw 'R7 package helper failed; inspect the bounded diagnostic artifact.'
          }
