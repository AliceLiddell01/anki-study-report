name: R7 temporary integrated acceptance v2

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: read

concurrency:
  group: r7-integrated-v2-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fast:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-integrated-acceptance-v2'
    name: Exact canonical non-Docker and package
    runs-on: windows-2025
    timeout-minutes: 30
    outputs:
      package_sha256: ${{ steps.package.outputs.package_sha256 }}
      manifest_sha256: ${{ steps.package.outputs.manifest_sha256 }}
      entry_count: ${{ steps.package.outputs.entry_count }}
      artifact_id: ${{ steps.upload_package.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload_package.outputs.artifact-digest }}
      artifact_name: ${{ steps.package.outputs.artifact_name }}
    env:
      OWNER_REVIEW_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Guard exact candidate
        shell: pwsh
        run: |
          $actual = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($actual -ne $env:OWNER_REVIEW_SHA) { throw "Exact SHA mismatch: $actual" }
          if ('${{ github.head_ref }}' -ne 'c1-5r-7-integrated-acceptance-v2') { throw 'Unexpected head branch.' }
          if ('${{ github.base_ref }}' -ne 'core') { throw 'Unexpected base branch.' }

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: web-dashboard/pnpm-lock.yaml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          Push-Location web-dashboard
          pnpm install --frozen-lockfile
          Pop-Location

      - name: Run canonical non-Docker verification
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force r7-fast/logs | Out-Null
          & .\scripts\run_full_check.ps1 -SkipDocker *>&1 | Tee-Object r7-fast/logs/full-check.log
          if ($LASTEXITCODE -ne 0) { throw 'Canonical non-Docker verification failed.' }

      - name: Stage exact package and deterministic manifest
        id: package
        shell: pwsh
        env:
          ARTIFACT_NAME: r7-package-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          python scripts/package_addon.py --output anki_study_report.ankiaddon --check-only
          if ($LASTEXITCODE -ne 0) { throw 'Package validation failed.' }
          Remove-Item r7-package, r7-provenance -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force r7-package, r7-provenance | Out-Null
          Copy-Item anki_study_report.ankiaddon r7-package/anki_study_report.ankiaddon -Force

          @'
          import hashlib
          import json
          import os
          import pathlib
          import zipfile
          from datetime import datetime, timezone

          package = pathlib.Path("r7-package/anki_study_report.ankiaddon")
          package_sha = hashlib.sha256(package.read_bytes()).hexdigest()
          artifact_name = os.environ["ARTIFACT_NAME"]
          metadata = {
              "schemaVersion": 1,
              "repository": os.environ["GITHUB_REPOSITORY"],
              "workflowName": "R7 temporary integrated acceptance v2",
              "workflowPath": ".github/workflows/r7-integrated-acceptance-v2.yml",
              "producerJob": "fast",
              "eventName": "pull_request",
              "ref": os.environ["GITHUB_REF"],
              "testedCommitSha": os.environ["OWNER_REVIEW_SHA"],
              "sourceHeadSha": os.environ["OWNER_REVIEW_SHA"],
              "sourceBaseSha": "${{ github.event.pull_request.base.sha }}",
              "runId": int(os.environ["GITHUB_RUN_ID"]),
              "runAttempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "artifactName": artifact_name,
              "packageName": package.name,
              "packageSha256": package_sha,
              "packageSizeBytes": package.stat().st_size,
              "createdAt": datetime.now(timezone.utc).isoformat(timespec="seconds").replace("+00:00", "Z"),
          }
          pathlib.Path("r7-package/r7-package-metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )

          manifest = []
          forbidden_parts = {
              ".git", ".pytest_cache", "__pycache__", "node_modules", "tests", "docker",
              "artifacts", "screenshots", "logs", "profiles", "user_files", "e2e-artifacts",
          }
          forbidden_suffixes = {".pyc", ".pyo", ".log", ".ankiaddon", ".zip"}
          with zipfile.ZipFile(package) as archive:
              bad = archive.testzip()
              if bad is not None:
                  raise SystemExit(f"ZIP integrity failed at {bad}")
              for info in sorted(archive.infolist(), key=lambda item: item.filename):
                  path = pathlib.PurePosixPath(info.filename)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"unsafe path: {info.filename}")
                  if {part.lower() for part in path.parts} & forbidden_parts:
                      raise SystemExit(f"forbidden package entry: {info.filename}")
                  if path.suffix.lower() in forbidden_suffixes:
                      raise SystemExit(f"forbidden package entry: {info.filename}")
                  data = b"" if info.is_dir() else archive.read(info.filename)
                  manifest.append({
                      "path": path.as_posix(),
                      "size": info.file_size,
                      "sha256": hashlib.sha256(data).hexdigest(),
                  })
          manifest_bytes = json.dumps(
              manifest, ensure_ascii=False, sort_keys=True, separators=(",", ":")
          ).encode("utf-8")
          manifest_sha = hashlib.sha256(manifest_bytes).hexdigest()
          pathlib.Path("r7-provenance/package-manifest.json").write_bytes(manifest_bytes)
          pathlib.Path("r7-provenance/package-verification.json").write_text(
              json.dumps({
                  "ankiaddonFilename": package.name,
                  "ankiaddonSha256": package_sha,
                  "packageManifestSha256": manifest_sha,
                  "packageEntryCount": len(manifest),
                  "zipIntegrityResult": "pass",
              }, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps({"packageSha256": package_sha, "manifestSha256": manifest_sha, "entryCount": len(manifest)}))
          '@ | python - 2>&1 | Tee-Object r7-fast/logs/package-manifest.log
          if ($LASTEXITCODE -ne 0) { throw 'Package manifest verification failed.' }

          @'
          import hashlib
          import json
          import os
          import pathlib

          root = pathlib.Path("r7-package")
          names = sorted(path.name for path in root.iterdir())
          if names != ["anki_study_report.ankiaddon", "r7-package-metadata.json"]:
              raise SystemExit(f"unexpected package artifact inventory: {names}")
          metadata = json.loads((root / "r7-package-metadata.json").read_text(encoding="utf-8"))
          package = root / "anki_study_report.ankiaddon"
          actual = hashlib.sha256(package.read_bytes()).hexdigest()
          expected_keys = {
              "schemaVersion", "repository", "workflowName", "workflowPath", "producerJob",
              "eventName", "ref", "testedCommitSha", "sourceHeadSha", "sourceBaseSha",
              "runId", "runAttempt", "artifactName", "packageName", "packageSha256",
              "packageSizeBytes", "createdAt",
          }
          if set(metadata) != expected_keys:
              raise SystemExit("package metadata keys mismatch")
          if metadata["testedCommitSha"] != os.environ["OWNER_REVIEW_SHA"]:
              raise SystemExit("tested commit mismatch")
          if metadata["sourceHeadSha"] != os.environ["OWNER_REVIEW_SHA"]:
              raise SystemExit("source head mismatch")
          if metadata["packageSha256"] != actual or metadata["packageSizeBytes"] != package.stat().st_size:
              raise SystemExit("package metadata bytes mismatch")
          if metadata["artifactName"] != os.environ["ARTIFACT_NAME"]:
              raise SystemExit("artifact name mismatch")
          '@ | python - 2>&1 | Tee-Object r7-fast/logs/package-metadata.log
          if ($LASTEXITCODE -ne 0) { throw 'Package metadata verification failed.' }

          $verification = Get-Content r7-provenance/package-verification.json -Raw | ConvertFrom-Json
          "package_sha256=$($verification.ankiaddonSha256)" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "manifest_sha256=$($verification.packageManifestSha256)" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "entry_count=$($verification.packageEntryCount)" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_name=$env:ARTIFACT_NAME" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Verify git hygiene
        shell: pwsh
        run: |
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          $tracked = git status --short --untracked-files=no
          if ($tracked) { throw "Tracked worktree changes detected:`n$tracked" }

      - name: Upload Fast provenance
        id: upload_provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r7-fast-provenance-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            r7-provenance/
            r7-fast/logs/
          if-no-files-found: error
          retention-days: 14
          compression-level: 9

      - name: Upload exact package artifact
        id: upload_package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: r7-package/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 9

      - name: Summarize exact package
        shell: pwsh
        run: |
          @(
            '## R7 exact canonical non-Docker and package'
            ''
            '| Field | Value |'
            '| --- | --- |'
            '| Owner review SHA | `${{ github.event.pull_request.head.sha }}` |'
            '| Package artifact | `${{ steps.package.outputs.artifact_name }}` |'
            '| Package artifact ID | `${{ steps.upload_package.outputs.artifact-id }}` |'
            '| GitHub artifact digest | `${{ steps.upload_package.outputs.artifact-digest }}` |'
            '| .ankiaddon SHA-256 | `${{ steps.package.outputs.package_sha256 }}` |'
            '| Manifest SHA-256 | `${{ steps.package.outputs.manifest_sha256 }}` |'
            '| Package entries | `${{ steps.package.outputs.entry_count }}` |'
            '| ZIP integrity | PASS |'
          ) | Add-Content $env:GITHUB_STEP_SUMMARY

  e2e:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-integrated-acceptance-v2'
    name: Exact package cards and full real-Anki E2E
    needs: fast
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      OWNER_REVIEW_SHA: ${{ github.event.pull_request.head.sha }}
      EXPECTED_PACKAGE_SHA256: ${{ needs.fast.outputs.package_sha256 }}
      ANKI_E2E_SCREENSHOT_WORKERS: '3'
      ANKI_E2E_RESOURCE_TELEMETRY: '1'
      ANKI_E2E_VERIFY_RESTART: '1'
      ANKI_E2E_NO_BUILD: '1'
      ANKI_E2E_CACHE_BACKEND: ghcr-digest
      ANKI_E2E_PREBUILT_ADDON_PATH: /e2e/local-input/anki_study_report.ankiaddon
      ANKI_VERSION: '26.05'
    steps:
      - name: Check out exact candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        shell: bash
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Download exact package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.fast.outputs.artifact_name }}
          path: r7-input

      - name: Verify and stage exact package
        shell: pwsh
        run: |
          @'
          import hashlib
          import json
          import os
          import pathlib

          root = pathlib.Path("r7-input")
          names = sorted(path.name for path in root.iterdir())
          if names != ["anki_study_report.ankiaddon", "r7-package-metadata.json"]:
              raise SystemExit(f"unexpected downloaded package inventory: {names}")
          package = root / "anki_study_report.ankiaddon"
          metadata = json.loads((root / "r7-package-metadata.json").read_text(encoding="utf-8"))
          actual = hashlib.sha256(package.read_bytes()).hexdigest()
          if actual != os.environ["EXPECTED_PACKAGE_SHA256"]:
              raise SystemExit(f"downloaded package SHA mismatch: {actual}")
          if metadata.get("testedCommitSha") != os.environ["OWNER_REVIEW_SHA"]:
              raise SystemExit("downloaded package tested SHA mismatch")
          if metadata.get("packageSha256") != actual:
              raise SystemExit("downloaded package metadata SHA mismatch")
          '@ | python -
          if ($LASTEXITCODE -ne 0) { throw 'Downloaded package verification failed.' }
          New-Item -ItemType Directory -Force docker/anki-e2e/local-input | Out-Null
          Copy-Item r7-input/anki_study_report.ankiaddon docker/anki-e2e/local-input/anki_study_report.ankiaddon -Force

      - name: Resolve immutable GHCR environment
        id: environment
        shell: pwsh
        run: |
          python scripts/validate_e2e_environment_consumer.py validate-consumer-lock `
            --spec docker/anki-e2e/environment-image-spec.json `
            --lock docker/anki-e2e/environment-image-lock.json `
            --github-output $env:GITHUB_OUTPUT
          if ($LASTEXITCODE -ne 0) { throw 'Environment lock validation failed.' }

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Pull and verify exact environment image
        shell: pwsh
        env:
          IMAGE_REFERENCE: ${{ steps.environment.outputs.image_reference }}
          IMAGE_DIGEST: ${{ steps.environment.outputs.image_digest }}
          IMAGE_PLATFORM: ${{ steps.environment.outputs.image_platform }}
          ENVIRONMENT_CONTRACT: ${{ steps.environment.outputs.environment_contract_sha256 }}
          PUBLICATION_RUN_ID: ${{ steps.environment.outputs.environment_publication_run_id }}
          REUSE_RUN_ID: ${{ steps.environment.outputs.environment_reuse_verification_run_id }}
        run: |
          $started = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds()
          docker pull --platform $env:IMAGE_PLATFORM $env:IMAGE_REFERENCE
          if ($LASTEXITCODE -ne 0) { throw 'Exact GHCR image pull failed.' }
          $repoDigests = docker image inspect $env:IMAGE_REFERENCE --format '{{json .RepoDigests}}' | ConvertFrom-Json
          if ($env:IMAGE_REFERENCE -notin @($repoDigests)) { throw 'Pulled image digest mismatch.' }
          $size = docker image inspect $env:IMAGE_REFERENCE --format '{{.Size}}'
          $duration = [DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds() - $started
          "ANKI_E2E_IMAGE=$env:IMAGE_REFERENCE" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANKI_E2E_IMAGE_DIGEST=$env:IMAGE_DIGEST" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANKI_E2E_IMAGE_PLATFORM=$env:IMAGE_PLATFORM" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANKI_E2E_IMAGE_PREPARATION_DURATION_MS=$duration" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANKI_E2E_IMAGE_SIZE_BYTES=$size" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANKI_E2E_ENVIRONMENT_CONTRACT_SHA256=$env:ENVIRONMENT_CONTRACT" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANKI_E2E_ENVIRONMENT_PUBLICATION_RUN_ID=$env:PUBLICATION_RUN_ID" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "ANKI_E2E_ENVIRONMENT_REUSE_VERIFICATION_RUN_ID=$env:REUSE_RUN_ID" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create bounded exact-scope runner
        shell: pwsh
        run: |
          @'
          param(
            [Parameter(Mandatory=$true)][ValidateSet("cards", "full")][string]$Scope
          )
          $ErrorActionPreference = "Stop"
          $raw = "r7-e2e-raw-$Scope"
          $output = "r7-e2e-$Scope"
          Remove-Item e2e-artifacts, $raw, $output -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $raw | Out-Null
          $env:ANKI_E2E_SCOPE = $Scope
          $startedAt = [DateTime]::UtcNow.ToString("o")
          $exitCode = 0
          try {
            & .\scripts\run_full_check.ps1 -DockerOnly -E2EScope $Scope -ScreenshotWorkers 3 -NoDockerBuild *>&1 | Tee-Object "$raw/e2e-run.log"
            $exitCode = $LASTEXITCODE
            if ($exitCode -ne 0) { throw "Canonical $Scope real-Anki E2E failed with exit code $exitCode." }
          } catch {
            if ($exitCode -eq 0) { $exitCode = 1 }
            $_ | Out-String | Add-Content "$raw/e2e-run.log"
          } finally {
            if (Test-Path e2e-artifacts/package/anki_study_report.ankiaddon -PathType Leaf) {
              $actual = (Get-FileHash -Algorithm SHA256 e2e-artifacts/package/anki_study_report.ankiaddon).Hash.ToLowerInvariant()
              if ($actual -ne $env:EXPECTED_PACKAGE_SHA256) {
                "E2E tested package mismatch: $actual" | Add-Content "$raw/e2e-run.log"
                $exitCode = 1
              }
              New-Item -ItemType Directory -Force e2e-artifacts/reports | Out-Null
              [ordered]@{
                schemaVersion = 1
                scope = $Scope
                ownerReviewSha = $env:OWNER_REVIEW_SHA
                e2eCheckoutSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
                e2ePackageSha256 = $actual
                packageArtifactId = '${{ needs.fast.outputs.artifact_id }}'
                packageArtifactDigest = '${{ needs.fast.outputs.artifact_digest }}'
                packageManifestSha256 = '${{ needs.fast.outputs.manifest_sha256 }}'
                packageEntryCount = [int]'${{ needs.fast.outputs.entry_count }}'
              } | ConvertTo-Json | Set-Content e2e-artifacts/reports/r7-package-provenance.json -Encoding utf8NoBOM
              [ordered]@{
                schemaVersion = 1
                imageSource = 'ghcr'
                imageReference = $env:ANKI_E2E_IMAGE
                imageDigest = $env:ANKI_E2E_IMAGE_DIGEST
                imagePlatform = $env:ANKI_E2E_IMAGE_PLATFORM
                imagePreparationDurationMs = [long]$env:ANKI_E2E_IMAGE_PREPARATION_DURATION_MS
                imageSizeBytes = [long]$env:ANKI_E2E_IMAGE_SIZE_BYTES
                environmentContractSha256 = $env:ANKI_E2E_ENVIRONMENT_CONTRACT_SHA256
                environmentPublicationRunId = [long]$env:ANKI_E2E_ENVIRONMENT_PUBLICATION_RUN_ID
                environmentReuseVerificationRunId = [long]$env:ANKI_E2E_ENVIRONMENT_REUSE_VERIFICATION_RUN_ID
                cacheState = 'ghcr-digest'
                workflowSourceSha = '${{ github.sha }}'
                e2eCheckoutSha = $env:OWNER_REVIEW_SHA
                packageSource = 'fast-ci-artifact'
                sourceFastCiRunId = [long]'${{ github.run_id }}'
                sourceFastCiTestedSha = $env:OWNER_REVIEW_SHA
                sourcePackageSha256 = $actual
              } | ConvertTo-Json | Set-Content e2e-artifacts/reports/environment-image-provenance.json -Encoding utf8NoBOM
            }

            if (Test-Path e2e-artifacts -PathType Container) {
              python scripts/prepare_ci_e2e_artifacts.py `
                --source e2e-artifacts `
                --output $output `
                --raw-logs $raw `
                --mode standard `
                --scope $Scope `
                --screenshot-workers 3 `
                --build-duration-ms 0 `
                --image-size-bytes $env:ANKI_E2E_IMAGE_SIZE_BYTES `
                --cache-state ghcr-digest `
                --e2e-exit-code $exitCode `
                --started-at $startedAt `
                --commit-sha $env:OWNER_REVIEW_SHA `
                --ref '${{ github.head_ref }}' `
                --package-source fast-ci-artifact `
                --source-fast-ci-run-id '${{ github.run_id }}' `
                --source-fast-ci-tested-sha $env:OWNER_REVIEW_SHA `
                --source-package-sha256 $env:EXPECTED_PACKAGE_SHA256 `
                --e2e-checkout-sha $env:OWNER_REVIEW_SHA
              if ($LASTEXITCODE -ne 0) {
                "Evidence preparation failed." | Add-Content "$raw/e2e-run.log"
                $exitCode = 1
              }
            }

            if (Test-Path $output -PathType Container) {
              @'
          import json
          import os
          import pathlib
          scope = os.environ["R7_SCOPE"]
          root = pathlib.Path(f"r7-e2e-{scope}")
          images = [
              {"path": path.relative_to(root).as_posix(), "size": path.stat().st_size}
              for path in sorted(root.rglob("*"))
              if path.is_file() and path.suffix.lower() in {".png", ".jpg", ".jpeg", ".webp"}
          ]
          reports = [path.relative_to(root).as_posix() for path in sorted(root.rglob("*.json"))]
          pathlib.Path(f"r7-e2e-{scope}/r7-screenshot-inventory.json").write_text(
              json.dumps({"scope": scope, "count": len(images), "files": images, "jsonReports": reports}, indent=2) + "\n",
              encoding="utf-8",
          )
          if not images:
              raise SystemExit(f"No screenshots in {scope} redacted evidence")
          pathlib.Path(f"r7-{scope}-screenshot-count.txt").write_text(str(len(images)), encoding="utf-8")
          '@ | Set-Content r7-inventory.py -Encoding utf8NoBOM
              $env:R7_SCOPE = $Scope
              python r7-inventory.py
              if ($LASTEXITCODE -ne 0) { $exitCode = 1 }
              Remove-Item r7-inventory.py -Force -ErrorAction SilentlyContinue
            }

            if ($env:ANKI_E2E_IMAGE) {
              docker compose -f docker/anki-e2e/docker-compose.yml -f docker/anki-e2e/docker-compose.ghcr.yml down -v --remove-orphans | Out-Null
            }
          }
          if ($exitCode -ne 0) { throw "$Scope real-Anki E2E or evidence preparation failed." }
          '@ | Set-Content r7-run-scope.ps1 -Encoding utf8NoBOM

      - name: Run targeted cards with restart
        shell: pwsh
        run: ./r7-run-scope.ps1 -Scope cards

      - name: Upload targeted cards evidence
        id: upload_cards
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r7-e2e-cards-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: r7-e2e-cards/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Run final full with restart
        shell: pwsh
        run: ./r7-run-scope.ps1 -Scope full

      - name: Upload final full evidence
        id: upload_full
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r7-e2e-full-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: r7-e2e-full/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Summarize exact E2E chain
        shell: pwsh
        run: |
          $cardsCount = (Get-Content r7-cards-screenshot-count.txt -Raw).Trim()
          $fullCount = (Get-Content r7-full-screenshot-count.txt -Raw).Trim()
          @(
            '## R7 exact real-Anki E2E chain'
            ''
            '| Field | Value |'
            '| --- | --- |'
            '| Owner review SHA | `${{ github.event.pull_request.head.sha }}` |'
            '| .ankiaddon SHA-256 | `${{ needs.fast.outputs.package_sha256 }}` |'
            '| Targeted cards artifact ID | `${{ steps.upload_cards.outputs.artifact-id }}` |'
            '| Targeted cards artifact digest | `${{ steps.upload_cards.outputs.artifact-digest }}` |'
            "| Targeted cards screenshots | `$cardsCount` |"
            '| Final full artifact ID | `${{ steps.upload_full.outputs.artifact-id }}` |'
            '| Final full artifact digest | `${{ steps.upload_full.outputs.artifact-digest }}` |'
            "| Final full screenshots | `$fullCount` |"
            '| E2E package SHA-256 | `${{ needs.fast.outputs.package_sha256 }}` |'
          ) | Add-Content $env:GITHUB_STEP_SUMMARY

      - name: Verify candidate worktree remains untouched
        shell: pwsh
        run: |
          if ((git rev-parse HEAD).Trim().ToLowerInvariant() -ne $env:OWNER_REVIEW_SHA) { throw 'Candidate SHA changed.' }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed.' }
          $tracked = git status --short --untracked-files=no
          if ($tracked) { throw "Tracked worktree changes detected:`n$tracked" }

      - name: Clean Docker state
        if: always()
        shell: pwsh
        run: |
          if ($env:ANKI_E2E_IMAGE) {
            docker compose -f docker/anki-e2e/docker-compose.yml -f docker/anki-e2e/docker-compose.ghcr.yml down -v --remove-orphans
          }
