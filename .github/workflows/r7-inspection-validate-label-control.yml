name: R7 temporary Inspection Profiles validation-label control

on:
  pull_request:
    branches: [core]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: r7-inspection-validate-label-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'c1-5r-7-inspection-validate-label-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ github.event.pull_request.head.sha }}'
          test '${{ github.head_ref }}' = 'c1-5r-7-inspection-validate-label-fix'
          test '${{ github.base_ref }}' = 'core'
          git cat-file -e '8647a3229c1ebd8e69af05611f81cbed5b8f0a7f^{commit}'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install focused dependencies
        shell: bash
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Apply exact validation-label repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          old = 'name: "Проверить профиль", exact: true'
          new = 'name: "Проверить настройку", exact: true'

          smoke = Path('docker/anki-e2e/smoke-browser.mjs')
          text = smoke.read_text(encoding='utf-8')
          function = text.split('async function assertInspectionProfilesWorkspace', 1)[1].split('async function captureZoomProof', 1)[0]
          if function.count(old) != 1 or function.count(new) != 0:
              raise SystemExit(f'Unexpected browser validation-label counts: old={function.count(old)}, new={function.count(new)}')
          smoke.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          tests = Path('tests/test_docker_smoke_helpers.py')
          tests_text = tests.read_text(encoding='utf-8')
          anchor = '    assert \'initialPriority === "high" ? "medium" : "high"\' in workspace\n'
          addition = (
              '    assert \'name: "Проверить настройку", exact: true\' in workspace\n'
              '    assert \'name: "Проверить профиль", exact: true\' not in workspace\n'
          )
          if tests_text.count(anchor) != 1 or addition in tests_text:
              raise SystemExit('Unexpected validation-label regression insertion state.')
          tests.write_text(tests_text.replace(anchor, anchor + addition), encoding='utf-8', newline='\n')
          PY

      - name: Verify focused repair
        shell: bash
        run: |
          set -euo pipefail
          node --check docker/anki-e2e/smoke-browser.mjs
          python -m pytest tests/test_docker_smoke_helpers.py
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py)
          test "${changed[*]}" = "${expected[*]}"

      - name: Normalize and push one permanent commit
        shell: bash
        run: |
          set -euo pipefail
          old_sha="$(git rev-parse HEAD)"
          test -f .r7-inspection-validate-label-trigger
          rm .r7-inspection-validate-label-trigger
          git reset --mixed '8647a3229c1ebd8e69af05611f81cbed5b8f0a7f'
          git add docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py
          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py)
          test "${staged[*]}" = "${expected[*]}"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test: use the current Inspection Profiles validation action'
          test "$(git rev-list --count '8647a3229c1ebd8e69af05611f81cbed5b8f0a7f'..HEAD)" = '1'
          git push --force-with-lease=refs/heads/c1-5r-7-inspection-validate-label-fix:"$old_sha" origin HEAD:refs/heads/c1-5r-7-inspection-validate-label-fix
