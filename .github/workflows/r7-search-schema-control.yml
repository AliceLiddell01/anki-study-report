name: R7 temporary Search schema harness control

on:
  pull_request:
    branches:
      - core

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'c1-5r-7-search-schema-fix'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: c1-5r-7-search-schema-fix
          fetch-depth: 0

      - name: Guard exact task identity
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.head.ref }}" = "c1-5r-7-search-schema-fix"
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install focused dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply exact Search schema v2 harness repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          smoke_path = Path('docker/anki-e2e/smoke-browser.mjs')
          source = smoke_path.read_text(encoding='utf-8')
          replacements = {
              '  const cardRequest = {\n    mode: "cards",': '  const cardRequest = {\n    schemaVersion: 2,\n    mode: "cards",',
              '  const cardInspect = await postSearchContract("/api/search/inspect", {\n    mode: "cards",': '  const cardInspect = await postSearchContract("/api/search/inspect", {\n    schemaVersion: 2,\n    mode: "cards",',
              '  const noteInspect = await postSearchContract("/api/search/inspect", {\n    mode: "notes",': '  const noteInspect = await postSearchContract("/api/search/inspect", {\n    schemaVersion: 2,\n    mode: "notes",',
              '  const inspectCard = async (requestId) => (await postSearchContract("/api/search/inspect", { mode: "cards", cardId, requestId })).body?.response?.details;': '  const inspectCard = async (requestId) => (await postSearchContract("/api/search/inspect", { schemaVersion: 2, mode: "cards", cardId, requestId })).body?.response?.details;',
              '  const inspectNote = async (requestId) => (await postSearchContract("/api/search/inspect", { mode: "notes", noteId, requestId })).body?.response?.details;': '  const inspectNote = async (requestId) => (await postSearchContract("/api/search/inspect", { schemaVersion: 2, mode: "notes", noteId, requestId })).body?.response?.details;',
              '  const movedQuery = await postSearchContract("/api/search/query", {\n    mode: "cards", query: "", filters:': '  const movedQuery = await postSearchContract("/api/search/query", {\n    schemaVersion: 2, mode: "cards", query: "", filters:',
          }
          for old, new in replacements.items():
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one Search harness occurrence, got {count}: {old!r}')
              source = source.replace(old, new, 1)
          smoke_path.write_text(source, encoding='utf-8')

          test_path = Path('tests/test_docker_smoke_helpers.py')
          tests = test_path.read_text(encoding='utf-8')
          marker = '\n\ndef test_smoke_browser_cards_workspace_uses_current_attention_inbox_contract():'
          if tests.count(marker) != 1:
              raise SystemExit('Search regression insertion marker was not unique')
          block = '''\n\ndef test_smoke_browser_search_contract_uses_schema_v2_requests():
              source = (
                  Path(__file__).resolve().parents[1] / "docker" / "anki-e2e" / "smoke-browser.mjs"
              ).read_text(encoding="utf-8")
              query_contract = source.split("async function assertSearchQueryContract", 1)[1].split(
                  "async function assertSafeEntityActions", 1
              )[0]
              action_contract = source.split("async function assertSafeEntityActions", 1)[1].split(
                  "async function assertSearchWorkspaceUi", 1
              )[0]

              assert 'const cardRequest = {\\n    schemaVersion: 2,' in query_contract
              assert 'schemaVersion: 2,\\n    mode: "cards",\\n    cardId,' in query_contract
              assert 'schemaVersion: 2,\\n    mode: "notes",\\n    noteId,' in query_contract
              assert '{ schemaVersion: 2, mode: "cards", cardId, requestId }' in action_contract
              assert '{ schemaVersion: 2, mode: "notes", noteId, requestId }' in action_contract
              assert 'schemaVersion: 2, mode: "cards", query: "", filters:' in action_contract
              assert 'postSearchContract("/api/search/inspect", {\\n    mode:' not in query_contract
              assert '{ mode: "cards", cardId, requestId }' not in action_contract
              assert '{ mode: "notes", noteId, requestId }' not in action_contract
          '''
          import textwrap
          tests = tests.replace(marker, textwrap.dedent(block) + marker, 1)
          test_path.write_text(tests, encoding='utf-8')
          PY

      - name: Verify focused repair
        shell: bash
        run: |
          set -euo pipefail
          node --check docker/anki-e2e/smoke-browser.mjs
          python -m pytest tests/test_docker_smoke_helpers.py
          git diff --check
          mapfile -t changed < <(git diff --name-only)
          printf '%s\n' "${changed[@]}"
          test "${#changed[@]}" -eq 2
          test "${changed[0]}" = "docker/anki-e2e/smoke-browser.mjs"
          test "${changed[1]}" = "tests/test_docker_smoke_helpers.py"

      - name: Normalize and push one permanent commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin core
          git reset --mixed origin/core
          git add docker/anki-e2e/smoke-browser.mjs tests/test_docker_smoke_helpers.py
          mapfile -t staged < <(git diff --cached --name-only)
          test "${#staged[@]}" -eq 2
          test "${staged[0]}" = "docker/anki-e2e/smoke-browser.mjs"
          test "${staged[1]}" = "tests/test_docker_smoke_helpers.py"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "test: send Search schema v2 from the browser smoke"
          git push --force-with-lease origin HEAD:c1-5r-7-search-schema-fix
