name: Temporary navigation contract repair

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/temporary-navigation-repair.yml"

permissions:
  contents: write

jobs:
  repair:
    name: Repair stale Statistics navigation assertion
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'codex/search-and-safe-actions'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Update the Statistics navigation contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('docker/anki-e2e/smoke-browser.mjs')
          workflow = Path('.github/workflows/temporary-navigation-repair.yml')
          old = 'JSON.stringify(["Сегодня", "Активность", "Статистика", "Колоды", "Карточки"])'
          new = 'JSON.stringify(["Сегодня", "Активность", "Статистика", "Колоды", "Поиск", "Карточки"])'
          text = source.read_text(encoding='utf-8')
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one stale navigation assertion, found {text.count(old)}')
          source.write_text(text.replace(old, new), encoding='utf-8')
          workflow.unlink()
          PY

          node --check docker/anki-e2e/smoke-browser.mjs
          python - <<'PY'
          import runpy
          scope = runpy.run_path('tests/test_e2e_screenshot_contract.py')
          scope['test_manifest_page_counts_follow_the_capture_contract']()
          scope['test_statistics_smoke_navigation_follows_the_router_and_russian_locale']()
          PY

      - name: Commit the focused repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker/anki-e2e/smoke-browser.mjs tests/test_e2e_screenshot_contract.py .github/workflows/temporary-navigation-repair.yml
          git diff --cached --check
          git commit -m "fix: align Statistics E2E navigation with Search"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
