services:
  anki-e2e:
    image: ${ANKI_E2E_IMAGE:-anki-study-report-e2e:local}
    build:
      context: ../..
      dockerfile: docker/anki-e2e/Dockerfile
      args:
        ANKI_VERSION: ${ANKI_VERSION:-26.05}
        ANKI_SHA256: ${ANKI_SHA256:-}
        ANKI_REQUIRE_SHA256: ${ANKI_REQUIRE_SHA256:-0}
        ANKI_PYTHON_PACKAGE: ${ANKI_PYTHON_PACKAGE:-anki==26.5}
    environment:
      ANKI_BASE: /e2e/anki-data
      ANKI_PROFILE: E2E
      ANKI_STUDY_REPORT_E2E: "1"
      ANKI_STUDY_REPORT_E2E_ARTIFACTS: /e2e/artifacts
      ANKI_STUDY_REPORT_E2E_READY_FILE: /e2e/artifacts/runtime/dashboard-ready.json
      ANKI_STUDY_REPORT_E2E_PORT: "8766"
      ANKI_STUDY_REPORT_TELEMETRY_E2E_ENDPOINT: http://127.0.0.1:8788
      ANKI_E2E_PERF100: ${ANKI_E2E_PERF100:-}
      E2E_MODE: ${E2E_MODE:-standard}
      ANKI_E2E_SCOPE: ${ANKI_E2E_SCOPE:-full}
      ANKI_E2E_SCREENSHOT_WORKERS: ${ANKI_E2E_SCREENSHOT_WORKERS:-3}
      ANKI_E2E_RESOURCE_TELEMETRY: ${ANKI_E2E_RESOURCE_TELEMETRY:-1}
      ANKI_E2E_VERIFY_RESTART: ${ANKI_E2E_VERIFY_RESTART:-auto}
      ANKI_E2E_CACHE_BACKEND: ${ANKI_E2E_CACHE_BACKEND:-local}
      ANKI_E2E_CACHE_STATE: ${ANKI_E2E_CACHE_STATE:-unknown}
      ANKI_E2E_PREBUILT_ADDON_PATH: ${ANKI_E2E_PREBUILT_ADDON_PATH:-}
      GITHUB_RUN_ID: ${GITHUB_RUN_ID:-local}
      GITHUB_SHA: ${GITHUB_SHA:-local}
      DISPLAY: ":99"
      HOME: /e2e/home
      WORKSPACE: /workspace
    volumes:
      - ../..:/workspace:ro
      - anki-e2e-data:/e2e/anki-data
      - ../../e2e-artifacts:/e2e/artifacts
    shm_size: "2gb"

volumes:
  anki-e2e-data:
