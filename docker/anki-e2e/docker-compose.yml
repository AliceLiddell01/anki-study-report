services:
  anki-e2e:
    build:
      context: ../..
      dockerfile: docker/anki-e2e/Dockerfile
      args:
        ANKI_VERSION: ${ANKI_VERSION:-26.05}
        ANKI_SHA256: ${ANKI_SHA256:-}
        ANKI_REQUIRE_SHA256: ${ANKI_REQUIRE_SHA256:-0}
        ANKI_PYTHON_PACKAGE: ${ANKI_PYTHON_PACKAGE:-anki==26.5}
    environment:
      ANKI_BASE: /e2e/anki-data
      ANKI_PROFILE: E2E
      ANKI_STUDY_REPORT_E2E: "1"
      ANKI_STUDY_REPORT_E2E_ARTIFACTS: /e2e/artifacts
      ANKI_STUDY_REPORT_E2E_READY_FILE: /e2e/artifacts/dashboard-ready.json
      ANKI_STUDY_REPORT_E2E_PORT: "8766"
      ANKI_E2E_APKG_FIXTURE_PATH: ${ANKI_E2E_APKG_FIXTURE_PATH:-}
      ANKI_E2E_REQUIRE_APKG_FIXTURE: ${ANKI_E2E_REQUIRE_APKG_FIXTURE:-}
      DISPLAY: ":99"
      HOME: /e2e/home
      WORKSPACE: /workspace
    volumes:
      - ../..:/workspace:ro
      - ./local-input:/e2e/local-input:ro
      - anki-e2e-data:/e2e/anki-data
      - ../../e2e-artifacts:/e2e/artifacts
    shm_size: "2gb"

volumes:
  anki-e2e-data:
